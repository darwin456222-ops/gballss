<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>The Pets Mansion V53</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --p: #6c5ce7; --s: #e74c3c; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; overflow: hidden; background: var(--bg); }
        
        /* Ekranlar */
        .screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; background: var(--bg); }
        .game-card { background: rgba(255,255,255,0.98); padding: 20px; border-radius: 30px; width: 85%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid #fff; }
        
        /* Pet Stage */
        .pet-stage { height: 180px; display: flex; justify-content: center; align-items: center; position: relative; margin: 15px 0; background: radial-gradient(circle, #fff 0%, #f0f0f0 100%); border-radius: 20px; }
        .pet-img { width: 130px; height: 130px; object-fit: contain; z-index: 10; transition: transform 0.3s; }
        .pet-name-bg { position: absolute; bottom: 10px; background: rgba(108, 92, 231, 0.1); padding: 4px 12px; border-radius: 10px; color: var(--p); font-weight: bold; font-size: 14px; }

        /* Barlar */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 11px; font-weight: bold; margin-bottom: 20px; }
        .bar-container { text-align: left; }
        .bar { background: #e0e0e0; height: 12px; border-radius: 6px; border: 1px solid #ccc; overflow: hidden; margin-top: 4px; }
        .prog { height: 100%; width: 100%; transition: 0.5s ease-in-out; }

        /* Odalar */
        .room-panel { min-height: 80px; display: flex; align-items: center; justify-content: center; }
        .action-btn { background: white; border: 2px solid #eee; border-radius: 15px; padding: 10px; font-size: 24px; cursor: pointer; transition: 0.2s; box-shadow: 0 3px 6px rgba(0,0,0,0.05); }
        .action-btn:active { transform: scale(0.9); border-color: var(--p); }

        /* Navigasyon */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #ddd; z-index: 100; box-shadow: 0 -5px 15px rgba(0,0,0,0.03); }
        .nav-btn { background: none; border: none; font-size: 26px; opacity: 0.3; display: flex; flex-direction: column; align-items: center; }
        .nav-btn.active { opacity: 1; color: var(--p); }
        .nav-btn span { font-size: 10px; font-weight: 600; margin-top: 3px; }

        /* Arena */
        #arena-screen { display: none; position: fixed; inset: 0; background: #12171b; z-index: 2000; color: white; }
        .fighter { width: 100px; transition: 0.1s; }
        .hp-bar-arena { width: 80px; height: 10px; background: #333; border: 1px solid white; border-radius: 5px; margin-bottom: 5px; overflow: hidden; }
        .jump { transform: translateY(-80px); }

        input { padding: 12px; border-radius: 12px; border: 1px solid #ddd; width: 80%; text-align: center; margin-bottom: 10px; font-size: 16px; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen">
        <div class="game-card">
            <h1 style="color:var(--p); margin-bottom: 5px;">The Pets V53</h1>
            <p style="font-size: 12px; color: #666; margin-bottom: 20px;">Hadi arkadaşlarınla kapış!</p>
            <input type="text" id="name-in" placeholder="Kendi Adını Yaz...">
            <button onclick="saveName()" style="background:var(--p); color:white; border:none; padding:16px; width:90%; border-radius:15px; font-weight:bold; font-size:16px; box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);">DEVAM ET</button>
        </div>
    </div>

    <div id="select-screen" class="screen" style="display:none;">
        <div class="game-card" style="max-height: 90%; overflow-y: auto;">
            <h2 style="color:#333;">Karakterini Seç</h2>
            <div id="pet-list" style="display:grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 10px;"></div>
        </div>
    </div>

    <div id="game-screen" style="display:none;">
        <div style="position:fixed; top:15px; width:100%; display:flex; justify-content:center; gap:15px; z-index:100;">
            <div style="background:white; padding:8px 18px; border-radius:20px; font-weight:bold; box-shadow:0 5px 15px rgba(0,0,0,0.08);">💰 <span id="gold-txt">0</span></div>
            <div style="background:white; padding:8px 18px; border-radius:20px; font-weight:bold; box-shadow:0 5px 15px rgba(0,0,0,0.08);">⭐ <span id="lvl-txt">1</span></div>
        </div>

        <div class="game-card" style="margin-top: 85px;">
            <div class="stats-grid">
                <div class="bar-container">🍔 Açlık <div class="bar"><div id="h-bar" class="prog" style="background:#2ecc71;"></div></div></div>
                <div class="bar-container">🚽 Tuvalet <div class="bar"><div id="t-bar" class="prog" style="background:#9b59b6;"></div></div></div>
                <div class="bar-container">😴 Uyku <div class="bar"><div id="s-bar" class="prog" style="background:#3498db;"></div></div></div>
                <div class="bar-container">🎮 Oyun <div class="bar"><div id="p-bar" class="prog" style="background:#f1c40f;"></div></div></div>
            </div>
            
            <div class="pet-stage">
                <img id="main-pet-img" class="pet-img" src="" alt="Pet">
                <div class="pet-name-bg" id="display-pet-name">Yükleniyor...</div>
            </div>

            <div id="kitchen-panel" class="room-panel">
                <div style="display:flex; gap:12px;">
                    <button class="action-btn" onclick="eat('🍕', 25, 10)">🍕</button>
                    <button class="action-btn" onclick="eat('🍔', 35, 15)">🍔</button>
                    <button class="action-btn" onclick="eat('🍩', 15, 5)">🍩</button>
                </div>
            </div>

            <div id="bath-panel" class="room-panel" style="display:none;">
                <button class="action-btn" onclick="action('toilet')" style="padding: 15px 40px;">🚽 TEMİZLEN</button>
            </div>

            <div id="bedroom-panel" class="room-panel" style="display:none;">
                <button class="action-btn" id="sleep-btn" onclick="toggleSleep()" style="background:var(--p); color:white; font-size:16px; font-weight:bold; padding: 15px 40px;">😴 UYUT</button>
            </div>

            <div id="office-panel" class="room-panel" style="display:none;">
                <button class="action-btn" onclick="work()" style="background:#2d3436; color:white; font-size:16px; font-weight:bold; padding: 15px 40px;">💻 KOD YAZ (+💰)</button>
            </div>

            <div id="garden-panel" class="room-panel" style="display:none;">
                <div style="width: 100%;">
                    <input type="number" id="room-id-input" placeholder="Savaş Odası Kodu">
                    <button onclick="enterArena()" style="background:var(--s); color:white; border:none; padding:15px; border-radius:15px; font-weight:bold; width:85%;">ARENAYA GİR ⚔️</button>
                </div>
            </div>
        </div>

        <div class="nav-bar">
            <button class="nav-btn active" onclick="goRoom('kitchen', this)">🍴<span>Mutfak</span></button>
            <button class="nav-btn" onclick="goRoom('bath', this)">🚿<span>Banyo</span></button>
            <button class="nav-btn" onclick="goRoom('bedroom', this)">🛏️<span>Yatak</span></button>
            <button class="nav-btn" onclick="goRoom('office', this)">💻<span>Ofis</span></button>
            <button class="nav-btn" onclick="goRoom('garden', this)">🌳<span>Bahçe</span></button>
        </div>
    </div>

    <div id="arena-screen">
        <div style="padding:20px; display:flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.3);">
            <button onclick="exitArena()" style="background:var(--s); color:white; border:none; padding:10px 20px; border-radius:10px; font-weight:bold;">KAÇ!</button>
            <div id="arena-info" style="font-weight:bold; color:var(--s);">ODA: -</div>
        </div>
        <div style="height:55%; display:flex; justify-content:space-around; align-items:flex-end; padding-bottom:50px;">
            <div id="p1" class="fighter">
                <div class="hp-bar-arena"><div id="p1-hp" style="height:100%; background:#2ecc71; width:100%;"></div></div>
                <img id="p1-img" src="" style="width:100%; filter: drop-shadow(0 0 10px rgba(46, 204, 113, 0.4));">
                <div id="p1-name" style="font-weight:bold; margin-top:5px;">-</div>
            </div>
            <div id="p2" class="fighter">
                <div class="hp-bar-arena"><div id="p2-hp" style="height:100%; background:#2ecc71; width:100%;"></div></div>
                <img id="p2-img" src="" style="width:100%; filter: drop-shadow(0 0 10px rgba(231, 76, 60, 0.4));">
                <div id="p2-name" style="font-weight:bold; margin-top:5px;">-</div>
            </div>
        </div>
        <button onclick="arenaHit()" style="width:130px; height:130px; background:var(--s); border:6px solid #fff; border-radius:50%; color:white; font-weight:bold; font-size:24px; box-shadow:0 0 30px rgba(231, 76, 60, 0.5); active { transform: scale(0.9); }">VUR!</button>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://tomoyunu-5cd2f-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Resim yollarını GitHub veya klasör yapısına göre tam kontrol et
        const pets = [
            {n:'Squeak', i:'Squeak.jpg'}, {n:'Flip', i:'Flip.jpg'}, 
            {n:'Sugar', i:'Sugar.jpg'}, {n:'Dot', i:'Dot.jpg'}, 
            {n:'Gus', i:'Gus.jpg'}, {n:'Blinky', i:'Blinky.jpg'}
        ];

        let st = { name:"", coins:100, pet:null, img:null, lvl:1, xp:0, hunger:60, toilet:0, sleep:0, play:0, isSleeping: false };
        let currentRoom = null; let mySlot = "";

        function init() {
            const list = document.getElementById('pet-list');
            list.innerHTML = "";
            pets.forEach(p => { 
                list.innerHTML += `
                <div onclick="selectPet('${p.n}','${p.i}')" style="background:#fff; padding:15px; border-radius:20px; border:2px solid #eee; text-align:center; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
                    <img src="${p.i}" style="width:80px; height:80px; object-fit:contain;" onerror="this.src='https://via.placeholder.com/80?text=${p.n}'">
                    <div style="margin-top:10px; font-weight:bold; color:#444;">${p.n}</div>
                </div>`; 
            });

            let saved = localStorage.getItem('pets_v53');
            if(saved) {
                st = JSON.parse(saved);
                if(st.name && st.pet) {
                    document.getElementById('login-screen').style.display = 'none';
                    showGame();
                }
            }
            setInterval(() => { if(!st.isSleeping && st.pet) { st.hunger = Math.max(0, st.hunger - 1); update(); }}, 6000);
        }

        function saveName() {
            let v = document.getElementById('name-in').value;
            if(v.trim()) { st.name = v; document.getElementById('login-screen').style.display='none'; document.getElementById('select-screen').style.display='flex'; }
        }

        function selectPet(n, i) {
            st.pet = n; st.img = i;
            document.getElementById('select-screen').style.display = 'none';
            showGame();
        }

        function showGame() {
            document.getElementById('game-screen').style.display = 'block';
            document.getElementById('main-pet-img').src = st.img;
            document.getElementById('display-pet-name').innerText = st.pet + " (" + st.name + ")";
            update();
        }

        function update() {
            document.getElementById('gold-txt').innerText = st.coins;
            document.getElementById('lvl-txt').innerText = st.lvl;
            document.getElementById('h-bar').style.width = st.hunger + "%";
            document.getElementById('t-bar').style.width = st.toilet + "%";
            document.getElementById('s-bar').style.width = st.sleep + "%";
            document.getElementById('p-bar').style.width = st.play + "%";
            localStorage.setItem('pets_v53', JSON.stringify(st));
        }

        function goRoom(r, b) {
            document.querySelectorAll('.room-panel').forEach(p => p.style.display = 'none');
            document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
            document.getElementById(r + '-panel').style.display = 'flex';
            b.classList.add('active');
        }

        function eat(f, h, t) { if(st.isSleeping) return; st.hunger = Math.min(100, st.hunger + h); st.toilet = Math.min(100, st.toilet + t); st.coins += 2; update(); }
        function action(type) { if(type === 'toilet') { st.toilet = 0; st.coins += 5; update(); } }
        function work() { st.coins += 20; update(); }
        function toggleSleep() { 
            st.isSleeping = !st.isSleeping; 
            document.getElementById('main-pet-img').style.transform = st.isSleeping ? "rotate(90deg) scale(0.8)" : "none"; 
            document.getElementById('sleep-btn').innerText = st.isSleeping ? "☀️ UYANDIR" : "😴 UYUT"; 
            document.getElementById('sleep-btn').style.background = st.isSleeping ? "#f1c40f" : "#6c5ce7";
        }

        // ARENA
        function enterArena() {
            let rid = document.getElementById('room-id-input').value;
            if(!rid) return;
            currentRoom = db.ref("rooms/" + rid);
            document.getElementById('arena-info').innerText = "ODA: " + rid;
            document.getElementById('arena-screen').style.display = 'block';
            
            currentRoom.once('value', (s) => {
                let d = s.val() || {};
                mySlot = (!d.p1) ? "p1" : "p2";
                currentRoom.child(mySlot).set({ name: st.name, img: st.img, hp: 100, jump: false });
                currentRoom.on('value', (snap) => {
                    let data = snap.val(); if(!data) return;
                    if(data.p1) { document.getElementById('p1-img').src = data.p1.img; document.getElementById('p1-name').innerText = data.p1.name; document.getElementById('p1-hp').style.width = data.p1.hp + "%"; if(data.p1.jump) document.getElementById('p1').classList.add('jump'); else document.getElementById('p1').classList.remove('jump'); }
                    if(data.p2) { document.getElementById('p2-img').src = data.p2.img; document.getElementById('p2-name').innerText = data.p2.name; document.getElementById('p2-hp').style.width = data.p2.hp + "%"; if(data.p2.jump) document.getElementById('p2').classList.add('jump'); else document.getElementById('p2').classList.remove('jump'); }
                });
            });
        }

        function arenaHit() {
            let target = (mySlot === "p1") ? "p2" : "p1";
            currentRoom.child(mySlot).update({ jump: true });
            setTimeout(() => currentRoom.child(mySlot).update({ jump: false }), 150);
            currentRoom.child(target).once('value', (s) => { if(s.exists()) currentRoom.child(target).update({ hp: Math.max(0, s.val().hp - 10) }); });
        }

        function exitArena() { if(mySlot && currentRoom) currentRoom.child(mySlot).remove(); if(currentRoom) currentRoom.off(); document.getElementById('arena-screen').style.display='none'; }

        init();
    </script>
</body>
</html>
