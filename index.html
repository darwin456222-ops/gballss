<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>The Pets Mansion V62</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --p: #6c5ce7; --s: #e74c3c; --bg: #f8f9fa; --health: #ff7675; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; overflow: hidden; background: var(--bg); user-select: none; }
        .screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; background: var(--bg); }
        .game-card { background: white; padding: 20px; border-radius: 30px; width: 85%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 2px solid #fff; position: relative; }
        
        .pet-stage { height: 160px; display: flex; justify-content: center; align-items: center; background: #fff; border-radius: 20px; border: 2px dashed #ddd; margin: 10px 0; position: relative; }
        .pet-img { width: 100px; height: 100px; object-fit: contain; z-index: 10; transition: transform 0.2s; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 11px; font-weight: bold; margin-bottom: 10px; }
        .bar { background: #eee; height: 10px; border-radius: 5px; overflow: hidden; border: 1px solid #ddd; }
        .prog { height: 100%; transition: 0.5s linear; }

        .room-panel { display: none; height: 100px; align-items: center; justify-content: center; gap: 10px; }
        .active-panel { display: flex !important; }
        
        /* Yemek Butonları */
        .food-btn { display: flex; flex-direction: column; align-items: center; background: white; border: 1px solid #eee; padding: 8px; border-radius: 15px; cursor: pointer; transition: 0.2s; min-width: 70px; }
        .food-btn:active { transform: scale(0.9); }
        .food-btn span { font-size: 10px; font-weight: bold; color: #2ecc71; margin-top: 4px; }
        .disabled { opacity: 0.4; pointer-events: none; grayscale: 1; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 12px 0; border-top: 2px solid #eee; }
        .nav-btn { background: none; border: none; font-size: 24px; opacity: 0.3; display: flex; flex-direction: column; align-items: center; }
        .nav-btn.active { opacity: 1; color: var(--p); }
        .nav-btn span { font-size: 10px; font-weight: bold; }

        .sleeping { transform: rotate(90deg) scale(0.8); opacity: 0.6; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen">
        <div class="game-card">
            <h1 style="color:var(--p)">The Pets V62</h1>
            <input type="text" id="name-in" placeholder="Karakter Adı" style="padding:10px; border-radius:10px; border:1px solid #ddd; width:80%;">
            <button onclick="saveName()" style="background:var(--p); color:white; border:none; padding:15px; width:88%; border-radius:15px; font-weight:bold; margin-top:10px;">BAŞLA</button>
        </div>
    </div>

    <div id="select-screen" class="screen" style="display:none;">
        <div class="game-card">
            <h2>Petini Seç</h2>
            <div id="pet-list" style="display:grid; grid-template-columns: 1fr 1fr; gap: 15px;"></div>
        </div>
    </div>

    <div id="game-screen" style="display:none;">
        <div style="position:fixed; top:15px; width:100%; display:flex; justify-content:center; gap:10px; z-index:100;">
            <div style="background:white; padding:5px 12px; border-radius:12px; font-weight:bold; box-shadow:0 4px 10px rgba(0,0,0,0.1);">💰 <span id="gold-txt">0</span></div>
            <div style="background:white; padding:5px 12px; border-radius:12px; font-weight:bold; box-shadow:0 4px 10px rgba(0,0,0,0.1);">⭐ <span id="lvl-txt">1</span></div>
        </div>

        <div class="game-card" style="margin-top: 80px;">
            <div class="stats-grid">
                <div style="grid-column: 1 / span 2; color:var(--health)">❤️ Sağlık <div class="bar"><div id="hth-bar" class="prog" style="background:var(--health); width:100%;"></div></div></div>
                <div>🍔 Açlık <div class="bar"><div id="h-bar" class="prog" style="background:#2ecc71;"></div></div></div>
                <div>🧼 Temizlik <div class="bar"><div id="t-bar" class="prog" style="background:#9b59b6;"></div></div></div>
                <div>😴 Uyku <div class="bar"><div id="s-bar" class="prog" style="background:#3498db;"></div></div></div>
                <div>🎮 Oyun <div class="bar"><div id="p-bar" class="prog" style="background:#f1c40f;"></div></div></div>
            </div>
            
            <div class="pet-stage">
                <img id="main-pet-img" class="pet-img" src="" onclick="catchPet()">
            </div>

            <div id="kitchen-panel" class="room-panel active-panel">
                <div class="food-btn" id="btn-burger" onclick="feed(50, 40, 'burger')">
                    <div style="font-size:24px;">🍔</div>
                    <span>40 💰</span>
                </div>
                <div class="food-btn" id="btn-pizza" onclick="feed(30, 20, 'pizza')">
                    <div style="font-size:24px;">🍕</div>
                    <span>20 💰</span>
                </div>
                <div class="food-btn" id="btn-donut" onclick="feed(15, 10, 'donut')">
                    <div style="font-size:24px;">🍩</div>
                    <span>10 💰</span>
                </div>
            </div>

            <div id="bath-panel" class="room-panel">
                <button onclick="wash()" style="background:#9b59b6; color:white; border:none; padding:15px 30px; border-radius:15px; font-weight:bold;">🚿 TEMİZLE</button>
            </div>
            <div id="bedroom-panel" class="room-panel">
                <button id="sleep-btn" onclick="toggleSleep()" style="background:#3498db; color:white; border:none; padding:15px 30px; border-radius:15px; font-weight:bold;">😴 UYUT</button>
            </div>
            <div id="office-panel" class="room-panel">
                <button onclick="work()" style="background:#2d3436; color:white; border:none; padding:15px 30px; border-radius:15px; font-weight:bold;">ÇALIŞ (+50💰)</button>
            </div>
            <div id="garden-panel" class="room-panel">
                <button onclick="startCatchGame()" style="background:#2ecc71; color:white; border:none; padding:12px; border-radius:12px; font-weight:bold;">YAKALAMA OYUNU</button>
            </div>
        </div>

        <div class="nav-bar">
            <button class="nav-btn active" onclick="goRoom('kitchen', this)">🍴<span>Mutfak</span></button>
            <button class="nav-btn" onclick="goRoom('bath', this)">🚿<span>Banyo</span></button>
            <button class="nav-btn" onclick="goRoom('bedroom', this)">🛏️<span>Yatak</span></button>
            <button class="nav-btn" onclick="goRoom('office', this)">💻<span>Ofis</span></button>
            <button class="nav-btn" onclick="goRoom('garden', this)">🌳<span>Bahçe</span></button>
        </div>
    </div>

    <script>
        const raw = "https://raw.githubusercontent.com/darwin456222-ops/Darwiizl/main/";
        const pets = [{n:'squeak', i: raw + 'squeak.jpg'}, {n:'flip', i: raw + 'flip.jpg'}, {n:'sugar', i: raw + 'sugar.jpg'}, {n:'dot', i: raw + 'dot.jpg'}, {n:'gus', i: raw + 'gus.jpg'}, {n:'blinky', i: raw + 'blinky.jpg'}];

        let st = { name:"", coins:100, pet:null, img:null, lvl:1, hunger:50, clean:100, energy:50, happy:50, health:100, isSleeping: false };
        let catchMode = false;

        function init() {
            const list = document.getElementById('pet-list');
            pets.forEach(p => { list.innerHTML += `<div onclick="selectPet('${p.n}','${p.i}')" style="background:#fff; padding:10px; border-radius:15px; border:1px solid #eee; cursor:pointer;"><img src="${p.i}" style="width:100%; height:50px; object-fit:contain;"><br><b style="font-size:12px;">${p.n}</b></div>`; });
            let saved = localStorage.getItem('pets_v62');
            if(saved) { st = JSON.parse(saved); if(st.name && st.pet) { document.getElementById('login-screen').style.display = 'none'; showGame(); } }
        }

        function saveName() { let v = document.getElementById('name-in').value; if(v.trim()){ st.name=v; document.getElementById('login-screen').style.display='none'; document.getElementById('select-screen').style.display='flex'; } }
        function selectPet(n, i) { st.pet=n; st.img=i; document.getElementById('select-screen').style.display='none'; showGame(); }
        function showGame() { document.getElementById('game-screen').style.display = 'block'; document.getElementById('main-pet-img').src = st.img; update(); }

        function update() {
            const cl = (v) => Math.max(0, Math.min(100, v));
            st.hunger = cl(st.hunger); st.clean = cl(cl(st.clean)); st.energy = cl(st.energy); st.happy = cl(st.happy); st.health = cl(st.health);

            // Zincirleme Etki
            if(st.hunger >= 100) st.clean -= 0.4;
            if(st.clean <= 20) st.energy -= 0.2;
            if(st.energy >= 100) st.happy -= 0.4;
            if(st.happy >= 100) st.health -= 0.1;
            if(st.health >= 100) st.hunger -= 0.1;

            // Para kontrolü ile butonları kilitleme
            document.getElementById('btn-burger').className = st.coins < 40 ? "food-btn disabled" : "food-btn";
            document.getElementById('btn-pizza').className = st.coins < 20 ? "food-btn disabled" : "food-btn";
            document.getElementById('btn-donut').className = st.coins < 10 ? "food-btn disabled" : "food-btn";

            document.getElementById('gold-txt').innerText = Math.floor(st.coins);
            document.getElementById('lvl-txt').innerText = st.lvl.toFixed(1);
            document.getElementById('h-bar').style.width = st.hunger + "%";
            document.getElementById('t-bar').style.width = st.clean + "%";
            document.getElementById('s-bar').style.width = st.energy + "%";
            document.getElementById('p-bar').style.width = st.happy + "%";
            document.getElementById('hth-bar').style.width = st.health + "%";
            localStorage.setItem('pets_v62', JSON.stringify(st));
        }

        setInterval(() => {
            if(st.isSleeping) { st.energy += 7; st.hunger -= 0.1; } 
            else { st.energy -= 0.4; st.hunger -= 0.4; st.happy -= 0.2; st.clean -= 0.1; }
            update();
        }, 3000);

        function feed(gain, cost, type) { 
            if(st.isSleeping || st.coins < cost) return; 
            st.coins -= cost;
            st.hunger += gain; 
            if(type === 'burger') st.clean -= 15;
            if(type === 'pizza') st.clean -= 7;
            update(); 
        }

        function wash() { st.clean = 100; update(); }
        function work() { if(st.energy < 20) return; st.energy -= 20; st.coins += 50; update(); }
        
        function toggleSleep() { 
            st.isSleeping = !st.isSleeping; 
            const img = document.getElementById('main-pet-img');
            if(st.isSleeping) img.classList.add('sleeping'); else img.classList.remove('sleeping');
            document.getElementById('sleep-btn').innerText = st.isSleeping ? "UYANDIR" : "UYUT";
            update();
        }

        function startCatchGame() { if(st.isSleeping) return; catchMode = true; movePet(); }
        function movePet() {
            if(!catchMode) return;
            const img = document.getElementById('main-pet-img');
            img.style.transform = `translate(${Math.random()*100-50}px, ${Math.random()*40-20}px)`;
            setTimeout(movePet, 700);
        }

        function catchPet() {
            if(!catchMode) return;
            st.coins += 2; st.happy += 10; st.lvl += 0.1;
            if(st.happy >= 100) { catchMode = false; document.getElementById('main-pet-img').style.transform="none"; }
            update();
        }

        function goRoom(r, b) {
            document.querySelectorAll('.room-panel').forEach(p => p.classList.remove('active-panel'));
            document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
            document.getElementById(r + '-panel').classList.add('active-panel');
            b.classList.add('active');
            catchMode = false;
        }

        init();
    </script>
</body>
</html>
