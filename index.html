<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>The Pets Mansion V100</title>
    <style>
        :root { --p: #6c5ce7; --bg: #f0f2f5; --hunger: #2ecc71; --clean: #00cec9; --sleep: #3498db; --fun: #f1c40f; --health: #ff7675; --garden: #e67e22; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); user-select: none; touch-action: manipulation; overflow: hidden; }
        
        /* ÜST PANEL */
        .top-bar { position: fixed; top: 10px; width: 100%; display: flex; justify-content: space-around; z-index: 1000; }
        .stat { background: white; padding: 5px 15px; border-radius: 15px; font-weight: 900; box-shadow: 0 4px 10px rgba(0,0,0,0.1); font-size: 14px; }

        /* OYUN KARTI */
        .game-card { background: white; width: 90%; max-width: 400px; height: 80vh; margin: 60px auto; border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; position: relative; }
        
        /* 6 BAR SİSTEMİ */
        .bars-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 15px; background: #fafafa; }
        .bar-wrap { font-size: 9px; font-weight: 900; }
        .bar-bg { background: #eee; height: 8px; border-radius: 4px; margin-top: 3px; overflow: hidden; }
        .bar-fill { height: 100%; width: 50%; transition: 0.5s; }

        /* ODA İÇERİKLERİ */
        .room { display: none; flex: 1; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; }
        .active-room { display: flex; }
        
        /* PET VE MİNİ PET GÖRSELİ */
        .stage { position: relative; height: 150px; width: 100%; display: flex; justify-content: center; align-items: center; margin-top: 10px; }
        .main-pet { width: 110px; z-index: 2; transition: 0.3s; }
        .mini-pet-follow { width: 45px; position: absolute; bottom: 10px; right: 25%; z-index: 3; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.2)); }

        /* BUTONLAR */
        .btn { border: none; padding: 12px 20px; border-radius: 15px; color: white; font-weight: 900; cursor: pointer; margin: 5px; box-shadow: 0 4px 0 rgba(0,0,0,0.2); width: 80%; }
        .btn:active { transform: translateY(2px); box-shadow: none; }

        /* BALON OYUNU */
        #game-canvas { background: #87ceeb; width: 100%; height: 250px; border-radius: 20px; position: relative; overflow: hidden; display: none; }
        .balloon { position: absolute; width: 40px; height: 50px; border-radius: 50%; cursor: pointer; animation: floatUp 3s linear forwards; }
        @keyframes floatUp { from { bottom: -50px; } to { bottom: 300px; } }

        /* NAVİGASYON */
        .nav { height: 65px; display: flex; justify-content: space-around; align-items: center; background: white; border-top: 1px solid #eee; }
        .nav-btn { font-size: 24px; cursor: pointer; opacity: 0.3; transition: 0.3s; background: none; border: none; }
        .nav-btn.on { opacity: 1; color: var(--p); transform: scale(1.2); }

        /* SELECTOR */
        #selector { position: fixed; inset: 0; background: white; z-index: 5000; display: none; flex-direction: column; align-items: center; padding: 20px; }
        .grid6 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    </style>
</head>
<body>

    <div id="selector">
        <h2>Evcil Hayvanını Seç</h2>
        <div class="grid6" id="pet-select-grid"></div>
    </div>

    <div class="top-bar">
        <div class="stat">💰 <span id="gold">100</span></div>
        <div class="stat">✨ <span id="xp">0</span></div>
        <button class="stat" onclick="document.getElementById('selector').style.display='flex'">🔄 Değiştir</button>
    </div>

    <div class="game-card">
        <div class="bars-grid">
            <div class="bar-wrap">🍔 AÇLIK <div class="bar-bg"><div id="fill-hng" class="bar-fill" style="background:var(--hunger)"></div></div></div>
            <div class="bar-wrap">🧼 TEMİZLİK <div class="bar-bg"><div id="fill-cln" class="bar-fill" style="background:var(--clean)"></div></div></div>
            <div class="bar-wrap">😴 UYKU <div class="bar-bg"><div id="fill-slp" class="bar-fill" style="background:var(--sleep)"></div></div></div>
            <div class="bar-wrap">🎮 EĞLENCE <div class="bar-bg"><div id="fill-fun" class="bar-fill" style="background:var(--fun)"></div></div></div>
            <div class="bar-wrap">❤️ SAĞLIK <div class="bar-bg"><div id="fill-hth" class="bar-fill" style="background:var(--health)"></div></div></div>
            <div class="bar-wrap">🌳 BAHÇE <div class="bar-bg"><div id="fill-gar" class="bar-fill" style="background:var(--garden)"></div></div></div>
        </div>

        <div class="stage">
            <img id="pet-img" class="main-pet" src="">
            <img id="mini-img" class="mini-pet-follow" src="" style="display:none;">
        </div>

        <div id="room-kitchen" class="room active-room">
            <h3>🍴 MUTFAK</h3>
            <div id="fridge-ui" style="font-size:12px; margin-bottom:10px;">Buzdolabı: Elma(0), Havuç(0), Çilek(0)</div>
            <button class="btn" style="background:#e74c3c" onclick="buyPizza()">🍕 PİZZA AL (15💰)</button>
            <button class="btn" style="background:#3498db" onclick="takeMeds()">💊 İLAÇ İÇ (10💰)</button>
            <button class="btn" style="background:#2ecc71" onclick="eatFromFridge()">🥫 BUZDOLABINDAN YE</button>
        </div>

        <div id="room-garden" class="room">
            <h3>🌳 BAHÇE</h3>
            <button class="btn" style="background:#f1c40f" onclick="spinSeed()">🎡 TOHUM ÇARKINI ÇEVİR</button>
            <div id="garden-plot" style="margin-top:10px;">Tohum bekleniyor...</div>
        </div>

        <div id="room-bedroom" class="room">
            <h3>😴 YATAK ODASI</h3>
            <div id="sleep-timer"></div>
            <button class="btn" style="background:#3498db" onclick="startSleep()">🛌 10 SN UYU</button>
        </div>

        <div id="room-bathroom" class="room">
            <h3>🧼 BANYO</h3>
            <button class="btn" style="background:#00cec9" onclick="wash()">🧼 YIKAN</button>
        </div>

        <div id="room-play" class="room">
            <h3>🎮 OYUN ODASI</h3>
            <button id="start-game-btn" class="btn" style="background:#f1c40f" onclick="startBalloons()">🎈 BALON PATLATMA</button>
            <div id="game-canvas"></div>
        </div>

        <div id="room-lab" class="room">
            <h3>🧬 LABORATUVAR</h3>
            <button class="btn" style="background:#6c5ce7" onclick="openEgg()">🥚 YUMURTA AÇ (50💰)</button>
            <div id="mini-index" style="font-size:10px; margin-top:10px; display:grid; grid-template-columns:repeat(3,1fr); gap:5px;"></div>
        </div>

        <div class="nav">
            <button class="nav-btn on" onclick="changeRoom('kitchen', this)">🍴</button>
            <button class="nav-btn" onclick="changeRoom('garden', this)">🌳</button>
            <button class="nav-btn" onclick="changeRoom('bedroom', this)">😴</button>
            <button class="nav-btn" onclick="changeRoom('bathroom', this)">🧼</button>
            <button class="nav-btn" onclick="changeRoom('play', this)">🎮</button>
            <button class="nav-btn" onclick="changeRoom('lab', this)">🧬</button>
        </div>
    </div>

    <script>
        const raw = "https://raw.githubusercontent.com/darwin456222-ops/Darwiizl/main/";
        const pets = ["squeak.jpg", "flip.jpg", "sugar.jpg", "gus.jpg", "dot.jpg", "blinky.jpg"];
        const miniPets = ["browny.jpg", "pinky.jpg", "sunny.jpg", "sleapy.jpg", "dinory.jpg", "stary.jpg"];
        
        let state = {
            gold: 100, xp: 0,
            pet: "blinky.jpg",
            activeMini: null,
            ownedMinis: [],
            fridge: { elma: 0, havuç: 0, çilek: 0 },
            bars: { hng: 50, cln: 50, slp: 50, fun: 50, hth: 50, gar: 50 }
        };

        // BAR DÖNGÜSÜ MANTIĞI
        function updateBars(type, amount) {
            state.bars[type] = Math.min(100, state.bars[type] + amount);
            
            // Eğer bir bar dolarsa (100 olursa) diğerini azalt
            if(state.bars[type] >= 100) {
                if(type === 'hng') state.bars.cln = Math.max(0, state.bars.cln - 20);
                if(type === 'cln') state.bars.slp = Math.max(0, state.bars.slp - 20);
                if(type === 'slp') state.bars.fun = Math.max(0, state.bars.fun - 10), state.bars.hth = Math.max(0, state.bars.hth - 10);
                if(type === 'hth') state.bars.gar = Math.max(0, state.bars.gar - 20);
                if(type === 'gar') state.bars.hng = Math.max(0, state.bars.hng - 20);
            }
            render();
        }

        function render() {
            document.getElementById('gold').innerText = state.gold;
            document.getElementById('xp').innerText = state.xp;
            document.getElementById('pet-img').src = raw + state.pet;
            if(state.activeMini) {
                document.getElementById('mini-img').src = raw + state.activeMini;
                document.getElementById('mini-img').style.display = 'block';
            }

            for(let key in state.bars) {
                document.getElementById('fill-' + key).style.width = state.bars[key] + "%";
            }
            document.getElementById('fridge-ui').innerText = `Buzdolabı: Elma(${state.fridge.elma}), Havuç(${state.fridge.havuç}), Çilek(${state.fridge.çilek})`;
        }

        // MUTFAK
        function buyPizza() { if(state.gold >= 15) { state.gold -= 15; updateBars('hng', 30); } }
        function takeMeds() { if(state.gold >= 10) { state.gold -= 10; updateBars('hth', 40); } }
        function eatFromFridge() {
            for(let f in state.fridge) {
                if(state.fridge[f] > 0) {
                    state.fridge[f]--;
                    updateBars('hng', 20);
                    return;
                }
            }
            alert("Buzdolabı boş! Bahçeden meyve topla.");
        }

        // BANYO & YATAK ODASI
        function wash() { updateBars('cln', 50); }
        function startSleep() {
            let btn = event.target; btn.disabled = true;
            let time = 10;
            let iv = setInterval(() => {
                time--; document.getElementById('sleep-timer').innerText = "Zzz... " + time;
                if(time <= 0) { 
                    clearInterval(iv); btn.disabled = false; 
                    document.getElementById('sleep-timer').innerText = "";
                    updateBars('slp', 100); 
                }
            }, 1000);
        }

        // BAHÇE
        function spinSeed() {
            const types = ['elma', 'havuç', 'çilek'];
            const picked = types[Math.floor(Math.random()*3)];
            document.getElementById('garden-plot').innerText = picked + " ekildi... (5 sn)";
            setTimeout(() => {
                state.fridge[picked]++;
                updateBars('gar', 40);
                document.getElementById('garden-plot').innerText = picked + " toplandı ve buzdolabına gitti!";
            }, 5000);
        }

        // BALON OYUNU
        function startBalloons() {
            document.getElementById('game-canvas').style.display = 'block';
            document.getElementById('start-game-btn').style.display = 'none';
            let score = 0;
            let gameIv = setInterval(() => {
                const b = document.createElement('div');
                b.className = 'balloon';
                b.style.left = Math.random() * 80 + "%";
                b.style.background = `hsl(${Math.random()*360}, 70%, 60%)`;
                b.onclick = () => { 
                    score++; b.remove(); 
                    state.gold += 2;
                    updateBars('fun', 5);
                };
                document.getElementById('game-canvas').appendChild(b);
            }, 800);
            setTimeout(() => { 
                clearInterval(gameIv); 
                document.getElementById('game-canvas').style.display = 'none';
                document.getElementById('start-game-btn').style.display = 'block';
                document.getElementById('game-canvas').innerHTML = "";
            }, 15000);
        }

        // LABORATUVAR
        function openEgg() {
            if(state.gold < 50) return alert("Yeterli altın yok!");
            state.gold -= 50;
            const pick = miniPets[Math.floor(Math.random()*6)];
            if(state.ownedMinis.includes(pick)) {
                state.xp += 50;
                alert("Zaten var! 50 XP kazandın.");
            } else {
                state.ownedMinis.push(pick);
                state.activeMini = pick;
                alert("Yeni mini pet: " + pick.split('.')[0]);
            }
            updateIndex(); render();
        }

        function updateIndex() {
            const idx = document.getElementById('mini-index');
            idx.innerHTML = "";
            miniPets.forEach(m => {
                const opacity = state.ownedMinis.includes(m) ? "1" : "0.2";
                idx.innerHTML += `<img src="${raw+m}" style="width:30px; opacity:${opacity};" onclick="if(state.ownedMinis.includes('${m}')) { state.activeMini='${m}'; render(); }">`;
            });
        }

        // ODALAR ARASI GEÇİŞ
        function changeRoom(id, btn) {
            document.querySelectorAll('.room').forEach(r => r.classList.remove('active-room'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('on'));
            document.getElementById('room-' + id).classList.add('active-room');
            btn.classList.add('on');
        }

        // PET SEÇİCİ
        window.onload = () => {
            const grid = document.getElementById('pet-select-grid');
            pets.forEach(p => {
                grid.innerHTML += `<img src="${raw+p}" style="width:80px; cursor:pointer;" onclick="state.pet='${p}'; document.getElementById('selector').style.display='none'; render();">`;
            });
            document.getElementById('selector').style.display = 'flex';
            updateIndex();
            // Zamanla barların azalması
            setInterval(() => {
                for(let k in state.bars) state.bars[k] = Math.max(0, state.bars[k] - 0.5);
                render();
            }, 3000);
        };
    </script>
</body>
</html>
