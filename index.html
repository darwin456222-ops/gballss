<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ThePets: Premium Edition</title>
    <style>
        :root { --panel: #ffffff; --bg: #d6e4f0; --accent: #5a67d8; --gold: #d69e2e; --success: #48bb78; }
        body { 
            margin: 0; background: var(--bg); color: #4a5568; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow: hidden; display: flex; flex-direction: column; align-items: center; 
            touch-action: none; user-select: none;
        }
        
        #ui { 
            width: 95%; max-width: 380px; display: flex; justify-content: space-between; align-items: center;
            padding: 15px; background: var(--panel); border-radius: 20px; 
            margin-top: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); z-index: 20;
        }
        #score { font-size: 28px; font-weight: 900; color: var(--accent); }
        #gold-display { color: var(--gold); font-weight: 800; font-size: 18px; }

        #game-container { 
            position: relative; width: 380px; height: 460px; 
            margin-top: 15px; border-radius: 25px; background: rgba(255,255,255,0.4);
            overflow: hidden; border: 4px solid white; cursor: none;
        }

        #shop { width: 95%; max-width: 380px; display: flex; gap: 12px; margin-top: 15px; }
        .ability-btn {
            flex: 1; padding: 12px; border-radius: 18px; border: none; background: white;
            font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            display: flex; flex-direction: column; align-items: center; gap: 4px;
        }

        #hierarchy { 
            width: 95%; max-width: 400px; display: flex; gap: 8px; 
            margin-top: 20px; padding: 10px; background: rgba(255,255,255,0.3); 
            border-radius: 15px; overflow-x: auto;
        }
        .h-item img { width: 34px; height: 34px; border-radius: 50%; border: 2px solid white; }
    </style>
</head>
<body>

<div id="ui">
    <div class="stats">
        <div id="score">0</div>
        <div id="gold-display">💰 <span id="gold-count">100</span></div>
    </div>
    <div class="next-preview" style="text-align: center;">
        <div style="font-size: 10px; font-weight: bold; margin-bottom: 2px;">SIRADAKİ</div>
        <img id="next-img" src="" width="45" height="45" style="border-radius:50%; border:2px solid white; background: white;">
    </div>
</div>

<div id="game-container">
    <canvas id="game-canvas"></canvas>
</div>

<div id="shop">
    <button class="ability-btn" onclick="handleAbility('undo')">↩️ GERİ AL<br><small style="font-size:9px">20 ALTIN</small></button>
    <button class="ability-btn" onclick="handleAbility('shake')">📳 SALLA<br><small style="font-size:9px">30 ALTIN</small></button>
</div>

<div id="hierarchy"></div>

<script>
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 380; canvas.height = 460;

    // YEYET ÇIKARILDI - Squeak son karakter yapıldı
    const PET_LIST = ["pinky", "dinory", "sleapy", "stary", "browny", "sunny", "flip", "dot", "gus", "sugar", "blinky", "squeak"];
    const RAW_URL = "https://raw.githubusercontent.com/darwin456222-ops/Darwiizl/main/";

    const PET_DATA = PET_LIST.map((name, i) => {
        const img = new Image();
        img.src = RAW_URL + name + ".jpg";
        return { name, r: 16 + (i * 7), img };
    });

    // Hiyerarşi Paneli
    const hBox = document.getElementById('hierarchy');
    PET_DATA.forEach(p => {
        const div = document.createElement('div');
        div.className = 'h-item';
        div.innerHTML = `<img src="${RAW_URL + p.name + '.jpg'}">`;
        hBox.appendChild(div);
    });

    let gold = 100, score = 0, items = [], history = [], isReady = true, mouseX = 190, smoothX = 190;
    let currLvl = 0, nextLvl = 1;

    function updateUI() {
        document.getElementById('gold-count').innerText = gold;
        document.getElementById('score').innerText = score;
        document.getElementById('next-img').src = RAW_URL + PET_DATA[nextLvl].name + ".jpg";
    }

    function handleAbility(type) {
        if (type === 'undo' && gold >= 20 && history.length > 0) {
            gold -= 20;
            items = JSON.parse(history.pop()).map(p => {
                let np = new Pet(p.x, p.y, p.level);
                np.vx = p.vx; np.vy = p.vy; return np;
            });
        } else if (type === 'shake' && gold >= 30) {
            gold -= 30;
            items.forEach(p => { p.vx += (Math.random()-0.5)*30; p.vy -= 15; });
        }
        updateUI();
    }

    class Pet {
        constructor(x, y, level, isStatic = false) {
            this.x = x; this.y = y; this.level = level;
            this.r = PET_DATA[level].r; this.vx = 0; this.vy = 0; this.isStatic = isStatic;
        }
        draw() {
            ctx.save();
            ctx.globalAlpha = this.isStatic ? 0.6 : 1;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI*2); ctx.clip();
            ctx.drawImage(PET_DATA[this.level].img, this.x - this.r, this.y - this.r, this.r * 2, this.r * 2);
            ctx.restore();
            ctx.strokeStyle = "white"; ctx.lineWidth = 3; ctx.stroke();
        }
        update() {
            if(this.isStatic) return;
            this.vy += 0.8; this.x += this.vx; this.y += this.vy;
            
            // HARİTA SINIR KONTROLÜ
            if (this.x < this.r) { this.x = this.r; this.vx *= -0.5; }
            if (this.x > 380 - this.r) { this.x = 380 - this.r; this.vx *= -0.5; }
            if (this.y > 460 - this.r) { this.y = 460 - this.r; this.vy *= -0.3; this.vx *= 0.9; }
        }
    }

    function checkPhysics() {
        for(let i=0; i<items.length; i++) {
            for(let j=i+1; j<items.length; j++) {
                let p1 = items[i], p2 = items[j];
                let dist = Math.hypot(p2.x - p1.x, p2.y - p1.y);
                if(dist < p1.r + p2.r) {
                    if(p1.level === p2.level) {
                        // Son seviye (Squeak) ise daha fazla yükselmez, puan verir
                        let nl = (p1.level >= PET_LIST.length - 1) ? p1.level : p1.level + 1;
                        if(p1.level < PET_LIST.length - 1) {
                            items.splice(j, 1); items.splice(i, 1);
                            items.push(new Pet((p1.x+p2.x)/2, (p1.y+p2.y)/2, nl));
                            gold += 5; score += 20; 
                        }
                        updateUI(); return;
                    }
                    let angle = Math.atan2(p2.y - p1.y, p2.x - p1.x);
                    let overlap = (p1.r + p2.r) - dist;
                    p1.x -= Math.cos(angle) * overlap * 0.3; p1.y -= Math.sin(angle) * overlap * 0.3;
                    p2.x += Math.cos(angle) * overlap * 0.3; p2.y += Math.sin(angle) * overlap * 0.3;
                }
            }
        }
    }

    canvas.addEventListener('click', () => {
        if(!isReady) return;
        history.push(JSON.stringify(items.map(p => ({x:p.x, y:p.y, level:p.level, vx:p.vx, vy:p.vy}))));
        if(history.length > 5) history.shift();
        items.push(new Pet(smoothX, 40, currLvl));
        isReady = false;
        setTimeout(() => { currLvl = nextLvl; nextLvl = Math.floor(Math.random()*3); isReady = true; updateUI(); }, 500);
    });

    function loop() {
        ctx.clearRect(0,0,380,460);
        const r = canvas.getBoundingClientRect();
        
        canvas.onmousemove = (e) => { mouseX = e.clientX - r.left; };
        canvas.ontouchmove = (e) => { mouseX = e.touches[0].clientX - r.left; };
        
        let limit = PET_DATA[currLvl].r;
        if (mouseX < limit) mouseX = limit; if (mouseX > 380 - limit) mouseX = 380 - limit;
        smoothX += (mouseX - smoothX) * 0.15;

        if(isReady) new Pet(smoothX, 40, currLvl, true).draw();
        checkPhysics();
        items.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(loop);
    }
    updateUI(); loop();
</script>
</body>
</html>
