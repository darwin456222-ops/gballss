<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>The Pets Mansion V60</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --p: #6c5ce7; --s: #e74c3c; --bg: #f8f9fa; --health: #ff7675; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; overflow: hidden; background: var(--bg); user-select: none; }
        .screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; background: var(--bg); }
        .game-card { background: white; padding: 20px; border-radius: 30px; width: 85%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 2px solid #fff; position: relative; }
        
        .pet-stage { height: 160px; display: flex; justify-content: center; align-items: center; background: #fff; border-radius: 20px; border: 2px dashed #ddd; margin: 10px 0; position: relative; overflow: hidden; }
        .pet-img { width: 100px; height: 100px; object-fit: contain; z-index: 10; transition: transform 0.2s; position: relative; cursor: pointer; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 11px; font-weight: bold; margin-bottom: 10px; }
        .bar { background: #eee; height: 10px; border-radius: 5px; overflow: hidden; border: 1px solid #ddd; }
        .prog { height: 100%; transition: 0.5s linear; }

        .room-panel { display: none; height: 85px; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .active-panel { display: flex !important; }
        .btn-act { font-size: 22px; padding: 10px 15px; border-radius: 15px; border: 1px solid #eee; background: white; cursor: pointer; }
        
        .change-btn { position: absolute; top: 10px; right: 10px; background: #eee; border: none; padding: 5px 10px; border-radius: 10px; font-size: 10px; font-weight: bold; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 12px 0; border-top: 2px solid #eee; }
        .nav-btn { background: none; border: none; font-size: 24px; opacity: 0.3; display: flex; flex-direction: column; align-items: center; }
        .nav-btn.active { opacity: 1; color: var(--p); }
        .nav-btn span { font-size: 10px; font-weight: bold; }

        #arena-screen { display: none; position: fixed; inset: 0; background: #1e272e; z-index: 2000; color: white; }
        .fighter { width: 100px; position: relative; transition: 0.1s; }
        .jump { transform: translateY(-70px); }
        input { padding: 12px; border-radius: 12px; border: 1px solid #ddd; width: 80%; text-align: center; }

        @keyframes sleepAnim { 0% { opacity: 0.4; } 50% { opacity: 0.8; } 100% { opacity: 0.4; } }
        .sleeping { animation: sleepAnim 2s infinite; transform: rotate(90deg) scale(0.8); }
    </style>
</head>
<body>

    <div id="login-screen" class="screen">
        <div class="game-card">
            <h1 style="color:var(--p)">The Pets V60</h1>
            <input type="text" id="name-in" placeholder="Kullanıcı Adın">
            <button onclick="saveName()" style="background:var(--p); color:white; border:none; padding:15px; width:88%; border-radius:15px; font-weight:bold; margin-top:10px;">GİRİŞ</button>
        </div>
    </div>

    <div id="select-screen" class="screen" style="display:none;">
        <div class="game-card">
            <h2>Karakter Seç</h2>
            <div id="pet-list" style="display:grid; grid-template-columns: 1fr 1fr; gap: 15px;"></div>
        </div>
    </div>

    <div id="game-screen" style="display:none;">
        <div style="position:fixed; top:15px; width:100%; display:flex; justify-content:center; gap:10px; z-index:100;">
            <div style="background:white; padding:5px 12px; border-radius:12px; font-weight:bold; box-shadow:0 4px 10px rgba(0,0,0,0.1);">💰 <span id="gold-txt">0</span></div>
            <div style="background:white; padding:5px 12px; border-radius:12px; font-weight:bold; box-shadow:0 4px 10px rgba(0,0,0,0.1);">⭐ <span id="lvl-txt">1</span></div>
        </div>

        <div class="game-card" style="margin-top: 80px;">
            <button class="change-btn" onclick="changePet()">🔄 DEĞİŞTİR</button>
            
            <div class="stats-grid">
                <div style="grid-column: 1 / span 2; color:var(--health)">❤️ Sağlık <div class="bar"><div id="hth-bar" class="prog" style="background:var(--health); width:100%;"></div></div></div>
                <div>🍔 Tokluk <div class="bar"><div id="h-bar" class="prog" style="background:#2ecc71;"></div></div></div>
                <div>🧼 Temizlik <div class="bar"><div id="t-bar" class="prog" style="background:#9b59b6;"></div></div></div>
                <div>😴 Uyku <div class="bar"><div id="s-bar" class="prog" style="background:#3498db;"></div></div></div>
                <div>🎮 Mutluluk <div class="bar"><div id="p-bar" class="prog" style="background:#f1c40f;"></div></div></div>
            </div>
            
            <div class="pet-stage" id="stage">
                <img id="main-pet-img" class="pet-img" src="" onclick="catchPet()">
            </div>

            <div id="kitchen-panel" class="room-panel active-panel">
                <button class="btn-act" onclick="feed(25)">🍕</button>
                <button class="btn-act" onclick="feed(45)">🍔</button>
            </div>
            <div id="bath-panel" class="room-panel">
                <button class="btn-act" onclick="wash()" style="background:#9b59b6; color:white; font-size:14px; padding:15px;">🧼 TEMİZLE</button>
            </div>
            <div id="bedroom-panel" class="room-panel">
                <button class="btn-act" id="sleep-btn" onclick="toggleSleep()" style="background:#3498db; color:white; font-size:14px; padding:15px;">😴 UYUT</button>
            </div>
            <div id="office-panel" class="room-panel">
                <button class="btn-act" onclick="work()" style="background:#2d3436; color:white; font-size:14px; padding:15px;">ÇALIŞ (+50💰)</button>
            </div>
            <div id="garden-panel" class="room-panel">
                <button onclick="startCatchGame()" style="background:#2ecc71; color:white; border:none; padding:10px; border-radius:12px; font-weight:bold; font-size:12px;">YAKALAMA OYUNU 🏃</button>
                <input type="number" id="room-id-input" placeholder="Oda Kodu" style="width:60px; margin-top:5px;">
                <button onclick="enterArena()" style="background:var(--s); color:white; border:none; padding:10px; border-radius:12px; font-weight:bold; font-size:12px;">ARENA ⚔️</button>
            </div>
        </div>

        <div class="nav-bar">
            <button class="nav-btn active" onclick="goRoom('kitchen', this)">🍴<span>Mutfak</span></button>
            <button class="nav-btn" onclick="goRoom('bath', this)">🚿<span>Banyo</span></button>
            <button class="nav-btn" onclick="goRoom('bedroom', this)">🛏️<span>Yatak</span></button>
            <button class="nav-btn" onclick="goRoom('office', this)">💻<span>Ofis</span></button>
            <button class="nav-btn" onclick="goRoom('garden', this)">🌳<span>Bahçe</span></button>
        </div>
    </div>

    <div id="arena-screen">
        <div style="padding:15px; display:flex; justify-content: space-between;">
            <button onclick="exitArena()" style="background:var(--s); color:white; border:none; padding:8px 15px; border-radius:8px;">ÇIK</button>
            <div id="arena-info">Oda: -</div>
        </div>
        <div style="height:50%; display:flex; justify-content:space-around; align-items:flex-end; padding-bottom:40px;">
            <div id="p1" class="fighter"><div id="p1-hp" style="height:5px; background:green; width:100%;"></div><img id="p1-img" src="" style="width:100%"></div>
            <div id="p2" class="fighter"><div id="p2-hp" style="height:5px; background:green; width:100%;"></div><img id="p2-img" src="" style="width:100%"></div>
        </div>
        <button onclick="arenaHit()" style="width:100px; height:100px; background:var(--s); border-radius:50%; color:white; font-weight:bold; border:4px solid white;">VUR!</button>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://tomoyunu-5cd2f-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const raw = "https://raw.githubusercontent.com/darwin456222-ops/Darwiizl/main/";
        const pets = [{n:'squeak', i: raw + 'squeak.jpg'}, {n:'flip', i: raw + 'flip.jpg'}, {n:'sugar', i: raw + 'sugar.jpg'}, {n:'dot', i: raw + 'dot.jpg'}, {n:'gus', i: raw + 'gus.jpg'}, {n:'blinky', i: raw + 'blinky.jpg'}];

        let st = { name:"", coins:100, pet:null, img:null, lvl:1, hunger:100, clean:100, energy:100, happy:100, health:100, isSleeping: false };
        let catchMode = false;

        function init() {
            const list = document.getElementById('pet-list'); list.innerHTML = "";
            pets.forEach(p => { list.innerHTML += `<div onclick="selectPet('${p.n}','${p.i}')" style="background:#fff; padding:10px; border-radius:15px; border:1px solid #eee; cursor:pointer;"><img src="${p.i}" style="width:100%; height:50px; object-fit:contain;"><br><b style="font-size:12px;">${p.n}</b></div>`; });
            let saved = localStorage.getItem('pets_v60');
            if(saved) { st = JSON.parse(saved); if(st.name && st.pet) { document.getElementById('login-screen').style.display = 'none'; showGame(); } }
        }

        function saveName() { let v = document.getElementById('name-in').value; if(v.trim()){ st.name=v; document.getElementById('login-screen').style.display='none'; document.getElementById('select-screen').style.display='flex'; } }
        function selectPet(n, i) { st.pet=n; st.img=i; document.getElementById('select-screen').style.display='none'; showGame(); }
        function changePet() { document.getElementById('game-screen').style.display='none'; document.getElementById('select-screen').style.display='flex'; }
        function showGame() { document.getElementById('game-screen').style.display = 'block'; document.getElementById('main-pet-img').src = st.img; update(); }

        function update() {
            const clamp = (v) => Math.max(0, Math.min(100, v));
            st.hunger = clamp(st.hunger); st.clean = clamp(st.clean); st.energy = clamp(st.energy); st.happy = clamp(st.happy); st.health = clamp(st.health);

            document.getElementById('gold-txt').innerText = Math.floor(st.coins);
            document.getElementById('lvl-txt').innerText = st.lvl;
            document.getElementById('h-bar').style.width = st.hunger + "%";
            document.getElementById('t-bar').style.width = st.clean + "%";
            document.getElementById('s-bar').style.width = st.energy + "%";
            document.getElementById('p-bar').style.width = st.happy + "%";
            document.getElementById('hth-bar').style.width = st.health + "%";
            localStorage.setItem('pets_v60', JSON.stringify(st));
        }

        // DÖNGÜ: Uyku ve azalma mantığı
        setInterval(() => {
            if(st.isSleeping) {
                if(st.energy < 100) st.energy += 5; // Uyurken hızlı dolar
                st.hunger -= 0.1;
            } else {
                st.energy -= 0.2; // Uyankken azalır
                st.hunger -= 0.3;
                st.happy -= 0.2;
                st.clean -= 0.1;
            }
            // Sağlık cezası
            if(st.hunger < 10 || st.clean < 10) st.health -= 1;
            else if(st.health < 100) st.health += 0.2;
            
            update();
        }, 2000);

        function feed(v) { if(st.isSleeping) return; st.hunger += v; update(); }
        function wash() { st.clean = 100; st.coins += 10; update(); }
        function work() { if(st.energy < 30) return alert("Çok yorgun!"); st.energy -= 30; st.coins += 50; update(); }
        
        function toggleSleep() { 
            st.isSleeping = !st.isSleeping; 
            const img = document.getElementById('main-pet-img');
            if(st.isSleeping) img.classList.add('sleeping'); else img.classList.remove('sleeping');
            document.getElementById('sleep-btn').innerText = st.isSleeping ? "UYANDIR" : "UYUT";
            update();
        }

        // YAKALAMA OYUNU
        function startCatchGame() {
            if(st.isSleeping) return;
            catchMode = true;
            alert("Petini yakala! Dokunarak 💰 ve ⭐ kazan!");
            movePet();
        }

        function movePet() {
            if(!catchMode) return;
            const img = document.getElementById('main-pet-img');
            const x = Math.random() * 150 - 75;
            const y = Math.random() * 60 - 30;
            img.style.transform = `translate(${x}px, ${y}px)`;
            setTimeout(movePet, 800);
        }

        function catchPet() {
            if(!catchMode) return;
            st.coins += 5;
            st.happy += 10;
            st.lvl += 0.1;
            document.getElementById('main-pet-img').style.filter = "brightness(1.5)";
            setTimeout(() => { 
                document.getElementById('main-pet-img').style.filter = "none";
                if(st.happy >= 100) { catchMode = false; document.getElementById('main-pet-img').style.transform = "none"; alert("Oyun bitti! Petin çok mutlu."); }
            }, 200);
            update();
        }

        function goRoom(r, b) {
            document.querySelectorAll('.room-panel').forEach(p => p.classList.remove('active-panel'));
            document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
            document.getElementById(r + '-panel').classList.add('active-panel');
            b.classList.add('active');
            catchMode = false; document.getElementById('main-pet-img').style.transform = "none";
        }

        // Arena aynı kalıyor
        function enterArena() { let rid = document.getElementById('room-id-input').value; if(!rid) return; document.getElementById('arena-screen').style.display='block'; }
        function exitArena() { document.getElementById('arena-screen').style.display='none'; }
        
        init();
    </script>
</body>
</html>
