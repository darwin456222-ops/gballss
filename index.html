<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>The Pets Mansion V63</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --p: #6c5ce7; --s: #e74c3c; --bg: #f8f9fa; --health: #ff7675; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; overflow: hidden; background: var(--bg); user-select: none; }
        .screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; background: var(--bg); }
        .game-card { background: white; padding: 20px; border-radius: 30px; width: 85%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 2px solid #fff; position: relative; }
        
        .pet-stage { height: 160px; display: flex; justify-content: center; align-items: center; background: #fff; border-radius: 20px; border: 2px dashed #ddd; margin: 10px 0; position: relative; }
        .pet-img { width: 100px; height: 100px; object-fit: contain; z-index: 10; transition: transform 0.2s; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 11px; font-weight: bold; margin-bottom: 10px; }
        .bar { background: #eee; height: 10px; border-radius: 5px; overflow: hidden; border: 1px solid #ddd; }
        .prog { height: 100%; transition: 0.3s; }

        .room-panel { display: none; height: 100px; align-items: center; justify-content: center; gap: 10px; }
        .active-panel { display: flex !important; }
        
        .food-btn { display: flex; flex-direction: column; align-items: center; background: white; border: 1px solid #eee; padding: 8px; border-radius: 15px; cursor: pointer; min-width: 65px; }
        .disabled { opacity: 0.4; pointer-events: none; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 12px 0; border-top: 2px solid #eee; }
        .nav-btn { background: none; border: none; font-size: 24px; opacity: 0.3; display: flex; flex-direction: column; align-items: center; }
        .nav-btn.active { opacity: 1; color: var(--p); }

        /* Arena Multiplayer */
        #arena-screen { display: none; position: fixed; inset: 0; background: #1e272e; z-index: 2000; color: white; }
        .fighter { width: 100px; position: relative; }
        .hp-bar { width: 80px; height: 8px; background: #444; border: 1px solid white; border-radius: 4px; overflow: hidden; margin-bottom: 5px; }
        .jump { transform: translateY(-60px); }
        .sleeping { transform: rotate(90deg) scale(0.8); opacity: 0.6; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen">
        <div class="game-card">
            <h1>The Pets V63</h1>
            <input type="text" id="name-in" placeholder="İsmin" style="padding:10px; width:70%;">
            <button onclick="saveName()" style="background:var(--p); color:white; border:none; padding:15px; width:80%; border-radius:15px; margin-top:10px;">GİRİŞ</button>
        </div>
    </div>

    <div id="select-screen" class="screen" style="display:none;">
        <div class="game-card"><h2>Petini Seç</h2><div id="pet-list" style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;"></div></div>
    </div>

    <div id="game-screen" style="display:none;">
        <div style="position:fixed; top:15px; width:100%; display:flex; justify-content:center; gap:10px; z-index:100;">
            <div style="background:white; padding:5px 12px; border-radius:12px; font-weight:bold;">💰 <span id="gold-txt">0</span></div>
            <div style="background:white; padding:5px 12px; border-radius:12px; font-weight:bold;">⭐ <span id="lvl-txt">1</span></div>
        </div>

        <div class="game-card" style="margin-top: 80px;">
            <button onclick="changePet()" style="position:absolute; top:10px; right:10px; font-size:10px;">DEĞİŞTİR</button>
            <div class="stats-grid">
                <div style="grid-column: 1/3; color:var(--health)">❤️ Sağlık <div class="bar"><div id="hth-bar" class="prog" style="background:var(--health);"></div></div></div>
                <div>🍔 Açlık <div class="bar"><div id="h-bar" class="prog" style="background:#2ecc71;"></div></div></div>
                <div>🚿 Tuvalet <div class="bar"><div id="t-bar" class="prog" style="background:#9b59b6;"></div></div></div>
                <div>😴 Uyku <div class="bar"><div id="s-bar" class="prog" style="background:#3498db;"></div></div></div>
                <div>🎮 Oyun <div class="bar"><div id="p-bar" class="prog" style="background:#f1c40f;"></div></div></div>
            </div>
            <div class="pet-stage"><img id="main-pet-img" class="pet-img" src="" onclick="catchPet()"></div>

            <div id="kitchen-panel" class="room-panel active-panel">
                <div class="food-btn" id="b-h" onclick="feed(50, 40, 'h')">🍔<span>40💰</span></div>
                <div class="food-btn" id="b-p" onclick="feed(30, 20, 'p')">🍕<span>20💰</span></div>
                <div class="food-btn" id="b-d" onclick="feed(15, 10, 'd')">🍩<span>10💰</span></div>
            </div>
            <div id="bath-panel" class="room-panel"><button onclick="wash()" style="background:#9b59b6; color:white; padding:15px; border-radius:15px; border:none;">🚿 TEMİZLE</button></div>
            <div id="bedroom-panel" class="room-panel"><button id="sleep-btn" onclick="toggleSleep()" style="background:#3498db; color:white; padding:15px; border-radius:15px; border:none;">😴 UYUT</button></div>
            <div id="office-panel" class="room-panel"><button onclick="work()" style="background:#2d3436; color:white; padding:15px; border-radius:15px; border:none;">ÇALIŞ (+50💰)</button></div>
            <div id="garden-panel" class="room-panel">
                <button onclick="startCatchGame()" style="background:#2ecc71; color:white; border:none; padding:10px; border-radius:10px;">YAKALAMA</button>
                <input type="number" id="room-id-input" placeholder="Kod" style="width:40px;">
                <button onclick="enterArena()" style="background:var(--s); color:white; border:none; padding:10px; border-radius:10px;">ARENA</button>
            </div>
        </div>

        <div class="nav-bar">
            <button class="nav-btn active" onclick="goRoom('kitchen', this)">🍴</button>
            <button class="nav-btn" onclick="goRoom('bath', this)">🚿</button>
            <button class="nav-btn" onclick="goRoom('bedroom', this)">🛏️</button>
            <button class="nav-btn" onclick="goRoom('office', this)">💻</button>
            <button class="nav-btn" onclick="goRoom('garden', this)">🌳</button>
        </div>
    </div>

    <div id="arena-screen">
        <div style="padding:10px; display:flex; justify-content:space-between;">
            <button onclick="exitArena()" style="background:red; color:white; border:none; padding:5px 15px; border-radius:5px;">ÇIK</button>
            <div id="arena-room-txt">Oda: -</div>
        </div>
        <div style="height:60%; display:flex; justify-content:space-around; align-items:flex-end; padding-bottom:50px;">
            <div id="p1" class="fighter">
                <div class="hp-bar"><div id="p1-hp-fill" style="height:100%; background:#2ecc71; width:100%;"></div></div>
                <img id="p1-img" src="" style="width:100%">
                <div id="p1-n" style="font-size:10px;">...</div>
            </div>
            <div id="p2" class="fighter">
                <div class="hp-bar"><div id="p2-hp-fill" style="height:100%; background:#2ecc71; width:100%;"></div></div>
                <img id="p2-img" src="" style="width:100%">
                <div id="p2-n" style="font-size:10px;">...</div>
            </div>
        </div>
        <button onclick="arenaHit()" style="width:100px; height:100px; background:red; border-radius:50%; color:white; font-weight:bold; border:5px solid white;">VUR!</button>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://tomoyunu-5cd2f-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const raw = "https://raw.githubusercontent.com/darwin456222-ops/Darwiizl/main/";
        const pets = [{n:'squeak', i: raw+'squeak.jpg'}, {n:'flip', i: raw+'flip.jpg'}, {n:'sugar', i: raw+'sugar.jpg'}, {n:'dot', i: raw+'dot.jpg'}, {n:'gus', i: raw+'gus.jpg'}, {n:'blinky', i: raw+'blinky.jpg'}];

        let st = { name:"", coins:100, pet:null, img:null, lvl:1, hunger:50, clean:100, energy:50, happy:50, health:100, isSleeping: false };
        let catchMode = false; let currentRoom = null; let mySlot = "";

        function init() {
            const list = document.getElementById('pet-list');
            pets.forEach(p => { list.innerHTML += `<div onclick="selectPet('${p.n}','${p.i}')" style="background:#fff; padding:5px; border-radius:10px; border:1px solid #eee;"><img src="${p.i}" style="width:100%; height:40px; object-fit:contain;"><br><b style="font-size:10px;">${p.n}</b></div>`; });
            let saved = localStorage.getItem('pets_v63');
            if(saved) { st = JSON.parse(saved); if(st.name && st.pet) { document.getElementById('login-screen').style.display='none'; showGame(); } }
        }

        function saveName() { let v = document.getElementById('name-in').value; if(v.trim()){ st.name=v; document.getElementById('login-screen').style.display='none'; document.getElementById('select-screen').style.display='flex'; } }
        function selectPet(n, i) { st.pet=n; st.img=i; document.getElementById('select-screen').style.display='none'; showGame(); }
        function showGame() { document.getElementById('game-screen').style.display='block'; document.getElementById('main-pet-img').src=st.img; update(); }
        function changePet() { document.getElementById('game-screen').style.display='none'; document.getElementById('select-screen').style.display='flex'; }

        function update() {
            const cl = (v) => Math.max(0, Math.min(100, v));
            st.hunger = cl(st.hunger); st.clean = cl(st.clean); st.energy = cl(st.energy); st.happy = cl(st.happy); st.health = cl(st.health);

            // DÖNGÜ MANTIĞI (Belirginleştirildi)
            if(st.hunger >= 95) st.clean -= 2;   // Açlık (Tokluk) dolunca Tuvalet azalır
            if(st.clean <= 5) st.energy -= 2;    // Tuvalet dolunca (kirliyse) Uyku azalır
            if(st.energy >= 95) st.happy -= 2;   // Uyku dolunca Oyun (Mutluluk) azalır
            if(st.happy >= 95) st.health -= 2;   // Oyun dolunca Sağlık azalır (yorulur)
            if(st.health >= 95) st.hunger -= 2;  // Sağlık dolunca Açlık azalır (metabolizma)

            document.getElementById('b-h').className = st.coins < 40 ? "food-btn disabled" : "food-btn";
            document.getElementById('b-p').className = st.coins < 20 ? "food-btn disabled" : "food-btn";
            document.getElementById('b-d').className = st.coins < 10 ? "food-btn disabled" : "food-btn";

            document.getElementById('gold-txt').innerText = Math.floor(st.coins);
            document.getElementById('lvl-txt').innerText = st.lvl.toFixed(1);
            document.getElementById('h-bar').style.width = st.hunger + "%";
            document.getElementById('t-bar').style.width = st.clean + "%";
            document.getElementById('s-bar').style.width = st.energy + "%";
            document.getElementById('p-bar').style.width = st.happy + "%";
            document.getElementById('hth-bar').style.width = st.health + "%";
            localStorage.setItem('pets_v63', JSON.stringify(st));
        }

        setInterval(() => {
            if(st.isSleeping) { st.energy += 10; st.hunger -= 0.5; } 
            else { st.energy -= 1; st.hunger -= 1; st.happy -= 0.5; st.clean -= 0.5; }
            update();
        }, 2000);

        function feed(g, c, t) { if(st.isSleeping || st.coins < c) return; st.coins -= c; st.hunger += g; if(t==='h') st.clean -= 15; update(); }
        function wash() { st.clean = 100; st.coins += 5; update(); }
        function work() { if(st.energy < 20) return; st.energy -= 20; st.coins += 50; update(); }
        function toggleSleep() { st.isSleeping = !st.isSleeping; document.getElementById('main-pet-img').className = st.isSleeping ? "pet-img sleeping" : "pet-img"; update(); }

        // Multiplayer Arena
        function enterArena() {
            let rid = document.getElementById('room-id-input').value; if(!rid) return;
            currentRoom = db.ref("rooms/" + rid);
            document.getElementById('arena-screen').style.display='block';
            document.getElementById('arena-room-txt').innerText = "Oda: " + rid;
            
            currentRoom.once('value', (s) => {
                let d = s.val() || {}; mySlot = (!d.p1) ? "p1" : "p2";
                currentRoom.child(mySlot).set({ name: st.name, img: st.img, hp: 100, jump: false });
                currentRoom.on('value', (snap) => {
                    let data = snap.val(); if(!data) return;
                    if(data.p1) { document.getElementById('p1-img').src=data.p1.img; document.getElementById('p1-n').innerText=data.p1.name; document.getElementById('p1-hp-fill').style.width=data.p1.hp+"%"; if(data.p1.jump) document.getElementById('p1').classList.add('jump'); else document.getElementById('p1').classList.remove('jump'); }
                    if(data.p2) { document.getElementById('p2-img').src=data.p2.img; document.getElementById('p2-n').innerText=data.p2.name; document.getElementById('p2-hp-fill').style.width=data.p2.hp+"%"; if(data.p2.jump) document.getElementById('p2').classList.add('jump'); else document.getElementById('p2').classList.remove('jump'); }
                });
            });
        }

        function arenaHit() {
            if(!mySlot) return;
            let target = (mySlot === "p1") ? "p2" : "p1";
            currentRoom.child(mySlot).update({ jump: true });
            setTimeout(() => currentRoom.child(mySlot).update({ jump: false }), 100);
            currentRoom.child(target).once('value', (s) => { if(s.exists()) currentRoom.child(target).update({ hp: Math.max(0, s.val().hp - 5) }); });
        }

        function exitArena() { if(mySlot && currentRoom) currentRoom.child(mySlot).remove(); currentRoom.off(); document.getElementById('arena-screen').style.display='none'; }
        
        // Yakalama
        function startCatchGame() { if(st.isSleeping) return; catchMode = true; movePet(); }
        function movePet() { if(!catchMode) return; document.getElementById('main-pet-img').style.transform = `translate(${Math.random()*100-50}px, ${Math.random()*40-20}px)`; setTimeout(movePet, 700); }
        function catchPet() { if(!catchMode) return; st.coins += 2; st.happy += 10; update(); if(st.happy >= 100) { catchMode=false; document.getElementById('main-pet-img').style.transform="none"; } }

        function goRoom(r, b) {
            document.querySelectorAll('.room-panel').forEach(p => p.classList.remove('active-panel'));
            document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
            document.getElementById(r + '-panel').classList.add('active-panel'); b.classList.add('active'); catchMode = false;
        }

        init();
    </script>
</body>
</html>
