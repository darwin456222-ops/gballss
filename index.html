<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>The Pets Mansion V106 - Ultimate Emotion & Multiplayer Edition</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root { 
            --p: #6c5ce7; --bg: #0f172a; --card-bg: #1e293b;
            --hunger: #2ecc71; --clean: #00cec9; --sleep: #3498db; 
            --fun: #f1c40f; --health: #ff7675; --garden: #e67e22; 
        }
        body { 
            font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); 
            user-select: none; -webkit-user-select: none; touch-action: manipulation; 
            overflow: hidden; transition: 0.3s; color: #f8fafc; 
        }

        .top-bar { position: fixed; top: 10px; width: 100%; display: flex; justify-content: space-around; z-index: 1000; padding: 0 5px; box-sizing: border-box; }
        .stat { background: #141b2d; color: white; padding: 6px 12px; border-radius: 12px; font-weight: 900; box-shadow: 0 4px 10px rgba(0,0,0,0.3); font-size: 11px; display: flex; align-items: center; gap: 4px; border: 1px solid #334155; }

        .game-card { background: var(--card-bg); width: 94%; max-width: 430px; height: 84vh; margin: 55px auto; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); display: flex; flex-direction: column; overflow: hidden; position: relative; border: 2px solid #334155; }
        .bars-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; padding: 10px; background: #141b2d; border-bottom: 1px solid #334155; }
        .bar-wrap { font-size: 9px; font-weight: 900; color: #94a3b8; }
        .bar-bg { background: #334155; height: 8px; border-radius: 4px; margin-top: 2px; overflow: hidden; }
        .bar-fill { height: 100%; width: 50%; transition: 0.5s ease; }

        .room { display: none; flex: 1; flex-direction: column; align-items: center; padding: 12px; overflow-y: auto; position: relative; }
        .active-room { display: flex; }

        .stage-area { position: relative; height: 140px; display: flex; justify-content: center; align-items: center; margin-top: 5px; width: 100%; background: #0f172a; border-radius: 20px; border: 1px solid #334155; }
        .main-pet { height: 100px; width: auto; z-index: 2; object-fit: contain; transition: transform 0.3s ease; }
        .mini-pet-follow { width: 35px; height: 35px; object-fit: cover; position: absolute; bottom: 5px; right: 20%; z-index: 3; border-radius: 50%; border: 2px solid white; }

        /* CANLI TEPKİ ANİMASYONLARI */
        .bounce { animation: bounceAnim 0.5s ease infinite alternate; }
        .shake { animation: shakeAnim 0.4s ease; }
        .scared { animation: scareAnim 0.3s ease infinite; }
        .spin { animation: spinAnim 0.5s ease; }
        .angry { animation: angryAnim 0.2s ease infinite; }

        @keyframes bounceAnim { 0% { transform: translateY(0); } 100% { transform: translateY(-12px); } }
        @keyframes shakeAnim { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px) rotate(-3deg); } 75% { transform: translateX(6px) rotate(3deg); } }
        @keyframes scareAnim { 0%, 100% { transform: scale(1); } 50% { transform: scale(0.9) translateY(3px); } }
        @keyframes spinAnim { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes angryAnim { 0%, 100% { transform: translateX(0) translateY(0); } 25% { transform: translateX(-2px) translateY(-2px); } 75% { transform: translateX(2px) translateY(2px); } }

        /* MULTIPLAYER ALANLARI */
        .other-players-area { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: auto; width: 100%; min-height: 55px; border-top: 1px dashed #334155; padding-top: 5px; }
        .other-player-pet { text-align: center; position: relative; cursor: pointer; }
        .other-player-pet img { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--p); object-fit: cover; }

        /* BALONCUKLAR */
        .bubble-msg { position: absolute; top: -30px; left: 50%; transform: translateX(-50%); background: white; color: black; padding: 2px 6px; border-radius: 10px; font-size: 11px; font-weight: bold; white-space: nowrap; box-shadow: 0 4px 6px rgba(0,0,0,0.3); z-index: 100; }
        .bubble-emoji { position: absolute; top: -45px; left: 50%; transform: translateX(-50%); font-size: 22px; animation: bounceAnim 0.4s infinite alternate; z-index: 101; }
        #room-bubble { position: absolute; top: 8px; background: white; color: black; padding: 6px 10px; border-radius: 12px; font-size: 11px; font-weight: bold; max-width: 85%; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 10; display: none; }

        /* BAHÇE */
        .garden-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; width: 100%; margin-top: 5px; }
        .plot { background: #8d6e63; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; border: 3px solid #6d4c41; cursor: pointer; font-size: 20px; }
        .plot.ready { animation: bounceAnim 0.4s infinite alternate; }

        /* OYUN ALANI */
        #game-canvas { background: #87ceeb; width: 100%; height: 150px; border-radius: 20px; position: relative; overflow: hidden; display: none; margin-top: 5px; }
        .balloon { position: absolute; width: 28px; height: 38px; border-radius: 50%; cursor: pointer; }
        .falling-fruit { position: absolute; font-size: 22px; z-index: 10; animation: fallDown 2.2s linear forwards; }

        /* PANELLER VE SEÇİMLER */
        .section-title { font-size: 10px; font-weight: bold; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; margin: 4px 0 2px 0; width: 100%; text-align: left; }
        .emotion-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; width: 100%; max-height: 110px; overflow-y: auto; }
        .question-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px; width: 100%; }

        .leaderboard-list { width: 100%; background: #141b2d; border-radius: 15px; padding: 8px; box-sizing: border-box; margin-top: 4px; font-size: 11px; border: 1px solid #334155; }
        .leaderboard-item { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #24334d; font-weight: bold; }

        @keyframes fallDown { from { top: -30px; } to { top: 160px; } }

        .btn { border: none; padding: 8px; border-radius: 12px; color: white; font-weight: 900; cursor: pointer; width: 95%; margin: 2px 0; box-shadow: 0 3px 0 rgba(0,0,0,0.2); font-size: 11px; transition: transform 0.1s; }
        .btn:active { transform: scale(0.97); }
        .nav { height: 50px; display: flex; justify-content: space-around; align-items: center; background: #141b2d; border-top: 1px solid #334155; width: 100%; }
        .nav-btn { font-size: 16px; cursor: pointer; opacity: 0.4; background: none; border: none; padding: 10px; transition: all 0.2s; }
        .nav-btn.on { opacity: 1; color: var(--p); transform: scale(1.15); }

        #char-overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.95); z-index: 5000; display: none; flex-direction: column; align-items: center; padding-top: 25px; overflow-y: auto; }
        .char-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 15px; padding: 0 15px; }
        .char-card { text-align: center; cursor: pointer; }
        .char-card img { width: 80px; height: 80px; object-fit: cover; border-radius: 15px; border: 3px solid transparent; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .char-card p { margin: 3px 0 0 0; font-size: 11px; font-weight: bold; color: #cbd5e1; }
        .char-card.selected img { border-color: var(--p); }
    </style>
</head>
<body>

                    karanlik: { text: "Karanlıkta kimse yaramazlık yapamaz çünkü nöbetçi canavar benim! 🖤", status: "like", anim: "angry" },
                    pamuk_seker: { text: "Pamuk şeker her yeri yapış yapış yapıyor, sınıfa sokmayın şunu! 🍭", status: "dislike", anim: "shake" },
                    cikolata: { text: "Çikolata yiyip sıraları kirletiyorsunuz, hiç sevmem! 🍫", status: "dislike", anim: "shake" },
                    elma: { text: "Elma yerken kütür kütür ses çıkartıp dersimi bölüyorsunuz, hayır! 🍏", status: "dislike", anim: "shake" },
                    oyuncak: { text: "Derste oyuncak oynamak kesinlikle YASAKTIR! El koyarım! 🧸", status: "dislike", anim: "shake" },
                    dondurma: { text: "Dondurma yiyip şifayı kapıyorsunuz, sonra okula gelmiyorsunuz, sevmem! 🍦", status: "dislike", anim: "shake" },
                    emoji: { text: "Sınav kağıtlarına emoji mi çiziyorsunuz?! En nefret ettiğim ciddiyetsizlik! 😡", status: "dislike", anim: "shake" },
                    parfum: { text: "Bu ağır parfüm kokusu sınıfın havasını bozuyor, pencereleri açın! 🧪", status: "dislike", anim: "shake" }
                }
            }
        };

        let bubbleTimeout;

        // VERİLERİ REALTİME DB'YE YAZMA
        function syncStatus() {
            let activeRoomEl = document.querySelector('.room.active-room');
            let roomName = activeRoomEl ? activeRoomEl.id.replace('room-', '') : 'kitchen';
            db.ref('players/' + myId).set({
                id: myId, pet: state.activePet, room: roomName, gold: state.gold, level: state.level, xp: state.xp,
                emoji: state.emo, lastSeen: Date.now(), bars: state.bars
            });
        }
        db.ref('players/' + myId).onDisconnect().remove();

        // CANLI OYUNCULARI VE TABLOYU DİNLEME
        db.ref('players').on('value', (snap) => {
            document.querySelectorAll('.other-players-area').forEach(a => a.innerHTML = "");
            const players = snap.val();
            if(!players) return;

            let leaderboardArr = [];

            for(let id in players) {
                const p = players[id];
                leaderboardArr.push(p);

                if(id === myId) {
                    if(p.bars) state.bars = p.bars;
                    continue;
                }
                // 15 saniyeden uzun süre veri göndermeyen pasif oyuncuları odadan düşür ama barlarını listele
                let isOffline = (Date.now() - p.lastSeen > 15000);
                
                const area = document.getElementById('players-' + p.room);
                if(area && !isOffline) {
                    const pDiv = document.createElement('div');
                    pDiv.className = 'other-player-pet';
                    pDiv.innerHTML = `<img src="${raw+p.pet}"><div style="font-size:8px; font-weight:bold; color:#6c5ce7;">${p.id} (Lvl ${p.level || 1})</div>`;

                    if(p.emoji) pDiv.innerHTML += `<div class="bubble-emoji">${p.emoji}</div>`;

                    // Gelişmiş İhtiyaç Karşılama ve Seviye İzleme Menüsü
                    pDiv.onclick = () => {
                        let friendBars = p.bars || { hng: 50, cln: 50, slp: 50 };
                        let eylem = prompt(
                            `🤝 ARKADAŞ PANELİ\nKodu: ${p.id}\nSeviyesi: Lvl ${p.level || 1}\n-----------------------\n` +
                            `🍔 Açlık: %${Math.floor(friendBars.hng)}\n🧼 Temizlik: %${Math.floor(friendBars.cln)}\n😴 Uyku: %${Math.floor(friendBars.slp)}\n-----------------------\n` +
                            `Ne yapmak istersin?\n1 - Arkadaşını Besle (1 Elma Harcar)\n2 - Arkadaşını Yıka`
                        );
                        if(eylem === "1") {
                            if(state.fridge.elma > 0) {
                                state.fridge.elma--;
                                db.ref(`players/${id}/bars/hng`).transaction(h => Math.min(100, (h || 0) + 25));
                                addXp(20);
                                alert("Arkadaşını besledin! İhtiyacı karşılandı. +20✨ XP!");
                            } else { alert("Buzdolabında elma kalmamış!"); }
                        } else if(eylem === "2") {
                            db.ref(`players/${id}/bars/cln`).transaction(c => Math.min(100, (c || 0) + 30));
                            addXp(20);
                            alert("Arkadaşına banyo yaptırdın! +20✨ XP!");
                        }
                    };
                    area.appendChild(pDiv);
                }
            }

            // LİDERLİK TABLOSU SIRALAMA
            leaderboardArr.sort((a,b) => (b.gold || 0) - (a.gold || 0));
            const lbEl = document.getElementById('leaderboard');
            if(lbEl) {
                lbEl.innerHTML = "";
                leaderboardArr.slice(0, 4).forEach((p, index) => {
                    lbEl.innerHTML += `<div class="leaderboard-item"><span>${index+1}. ${p.id} (Lvl ${p.level || 1})</span> <span>💰${p.gold || 0}</span></div>`;
                });
            }
        });

        // SADECE EMOJİ REAKSİYON SİSTEMİ
        function sendEmoji(emoji) { state.emo = emoji; syncStatus(); setTimeout(() => { state.emo = ""; syncStatus(); }, 3000); }

        // ODA 7: ENTEGRE DUYGU DÜNYASI FONKSİYONLARI
        function askQuestion(qType) {
            const charData = emotionalData[state.activePet];
            if(!charData) return;
            clearTimeout(bubbleTimeout);

            const petImg = document.getElementById('pet-img');
            petImg.className = "main-pet";

            if(charData.personality === "Şapşal" || charData.personality === "Neşeli") petImg.classList.add("bounce");
            else if(charData.personality === "Utangaç") petImg.classList.add("scared");
            else if(state.activePet === "gus.jpg") petImg.classList.add("angry");
            else if(state.activePet === "dot.jpg") petImg.classList.add("spin");

            const bbl = document.getElementById('room-bubble');
            bbl.style.display = 'block';
            if (qType === 'likes') bbl.innerText = charData.qLikes;
            if (qType === 'dislikes') bbl.innerText = charData.qDislikes;
            if (qType === 'favOne') bbl.innerText = charData.qFavOne;
            if (qType === 'hateOne') bbl.innerText = charData.qHateOne;
            if (qType === 'bestFriend') bbl.innerText = charData.qFriend;
            if (qType === 'intro') bbl.innerText = charData.qIntro;

            bubbleTimeout = setTimeout(() => { resetPetAnimation(); }, 5000);
        }

        function giveItem(itemType) {
            const charData = emotionalData[state.activePet];
            if(!charData) return;
            clearTimeout(bubbleTimeout);

            const petImg = document.getElementById('pet-img');
            petImg.className = "main-pet";

            const response = charData.responses[itemType];
            const bbl = document.getElementById('room-bubble');
            bbl.style.display = 'block';

            if(response) {
                bbl.innerText = response.text;
                petImg.classList.add(response.anim);

                if(response.status === "like") {
                    state.happiness = Math.min(100, state.happiness + 15);
                    updateBars('fun', 15);
                } else {
                    state.happiness = Math.max(0, state.happiness - 20);
                    updateBars('fun', -15);
                }
            }
            updateUiEmotion();
            bubbleTimeout = setTimeout(() => { resetPetAnimation(); }, 4000);
        }

        function resetPetAnimation() {
            const petImg = document.getElementById('pet-img');
            const bbl = document.getElementById('room-bubble');
            if(bbl) bbl.style.display = 'none';
            if(petImg) {
                petImg.className = "main-pet";
                const charData = emotionalData[state.activePet];
                if(charData && (charData.personality === "Şapşal" || charData.personality === "Neşeli")) {
                    petImg.classList.add("bounce");
                }
            }
        }

        function updateUiEmotion() {
            document.getElementById('percentageLabel').innerText = "Mutluluk: " + state.happiness + "%";
            const mood = document.getElementById('moodLabel');
            if (state.happiness > 75) mood.innerText = "Duygu: Harika! 😍";
            else if (state.happiness > 40) mood.innerText = "Duygu: Normal 🙂";
            else if (state.happiness > 15) mood.innerText = "Duygu: Üzgün 😢";
            else mood.innerText = "Duygu: Sinirli 🤬";
        }

        // BALON MİNİ OYUNU
        function startMultiplayerBalloons() {
            db.ref('balloons').remove();
            document.getElementById('game-canvas').style.display = 'block';
            document.getElementById('game-btn').style.display = 'none';
            document.getElementById('game-btn2').style.display = 'none';

            for(let i=0; i<6; i++) {
                db.ref('balloons/b_' + i).set({
                    left: Math.random() * 85,
                    bottom: Math.random() * 90 + 20,
                    color: `hsl(${Math.random()*360}, 75%, 60%)`
                });
            }
            setTimeout(() => {
                document.getElementById('game-canvas').style.display = 'none';
                document.getElementById('game-btn').style.display = 'block';
                document.getElementById('game-btn2').style.display = 'block';
                db.ref('balloons').remove();
            }, 10000);
        }

        db.ref('balloons').on('value', (snap) => {
            const cvs = document.getElementById('game-canvas');
            if(cvs.style.display !== 'block' || document.getElementById('btn-left') !== null) return;

            document.querySelectorAll('.balloon').forEach(b => b.remove());
            const balloons = snap.val();
            if(!balloons) return;

            for(let id in balloons) {
                const bData = balloons[id];
                const b = document.createElement('div');
                b.className = 'balloon';
                b.style.left = bData.left + "%";
                b.style.bottom = bData.bottom + "px";
                b.style.background = bData.color;

                b.onclick = () => {
                    db.ref('balloons/' + id).remove();
                    state.gold += 5;
                    updateBars('fun', 8);
                };
                cvs.appendChild(b);
            }
        });

        // MEYVE YAKALA OYUNU (HATALAR GİDERİLDİ, SİLİNDİ, TOUCH UYUMLU)
        let fruitIv = null;
        let moveInterval = null;
        function startCatchGame() {
            const cvs = document.getElementById('game-canvas');
            cvs.style.display = 'block';
            document.getElementById('game-btn').style.display = 'none';
            document.getElementById('game-btn2').style.display = 'none';

            cvs.innerHTML = `
                <div id="basket" style="position:absolute; bottom:30px; left:45%; font-size:24px; transition: left 0.08s linear; z-index:50;">🪣</div>
                <div style="position:absolute; bottom:2px; width:100%; display:flex; justify-content:space-between; padding:0 8px; box-sizing:border-box; z-index:200;">
                    <button class="btn" style="background:#2c3e50; padding:5px; width:45%; margin:0;" id="btn-left">👈 SOL</button>
                    <button class="btn" style="background:#2c3e50; padding:5px; width:45%; margin:0;" id="btn-right">SAĞ 👉</button>
                </div>
            `;

            let basketPos = 45;
            function doMove(dir) {
                if (dir === 'left') basketPos = Math.max(5, basketPos - 6);
                else if (dir === 'right') basketPos = Math.min(85, basketPos + 6);
                const bsk = document.getElementById('basket');
                if(bsk) bsk.style.left = basketPos + "%";
            }

            const btnLeft = document.getElementById('btn-left');
            const btnRight = document.getElementById('btn-right');

            const clearInts = () => { clearInterval(moveInterval); };
            btnLeft.addEventListener('mousedown', () => { clearInts(); moveInterval = setInterval(() => doMove('left'), 40); });
            btnLeft.addEventListener('touchstart', (e) => { e.preventDefault(); clearInts(); moveInterval = setInterval(() => doMove('left'), 40); });
            btnRight.addEventListener('mousedown', () => { clearInts(); moveInterval = setInterval(() => doMove('right'), 40); });
            btnRight.addEventListener('touchstart', (e) => { e.preventDefault(); clearInts(); moveInterval = setInterval(() => doMove('right'), 40); });

            btnLeft.addEventListener('mouseup', clearInts); btnLeft.addEventListener('touchend', clearInts);
            btnRight.addEventListener('mouseup', clearInts); btnRight.addEventListener('touchend', clearInts);

            fruitIv = setInterval(() => {
                const f = document.createElement('div');
                f.className = 'falling-fruit';
                f.innerHTML = ['🍎','🥕','🍓'][Math.floor(Math.random()*3)];
                let fLeft = Math.random() * 80 + 5;
                f.style.left = fLeft + "%";
                cvs.appendChild(f);

                setTimeout(() => {
                    if(Math.abs(fLeft - basketPos) <= 12) { 
                        state.gold += 6;
                        updateBars('fun', 6);

                        const bsk = document.getElementById('basket');
                        if(bsk) { bsk.style.transform = "scale(1.3)"; setTimeout(() => bsk.style.transform="scale(1)", 100); }

                        // 🔥 YEYET ÇAPRAZ VURUŞ (CROSS-STRIKE) MEKANİĞİ ENTEGRASYONU
                        if(state.activePet === "yeyet.jpg") {
                            const petImg = document.getElementById('pet-img');
                            if(petImg) {
                                petImg.style.transition = "transform 0.12s ease";
                                petImg.style.transform = "rotate(15deg) scale(1.25) translate(12px, -12px)";
                                setTimeout(() => {
                                    petImg.style.transform = "rotate(-15deg) scale(1.25) translate(-12px, -12px)";
                                    setTimeout(() => { resetPetAnimation(); }, 120);
                                }, 120);
                            }
                        }
                    }
                    f.remove();
                }, 2200);
            }, 850);

            setTimeout(() => {
                clearInterval(fruitIv); clearInterval(moveInterval);
                cvs.style.display = 'none';
                document.getElementById('game-btn').style.display = 'block';
                document.getElementById('game-btn2').style.display = 'block';
                cvs.innerHTML = "";
            }, 14000);
        }

        // LEVEL VE BAHÇE ALTYAPILARI
        function addXp(amount) {
            state.xp += amount;
            if(state.xp >= state.level * 100) {
                state.xp -= (state.level * 100);
                state.level++;
                state.gold += 50;
                alert(`🎊 TEBRİKLER SEVİYE ATLANDI! Yeni Seviye: ${state.level}`);
            }
            render(); syncStatus();
        }

        function craftSmoothie() {
            if(state.fridge.elma >= 1 && state.fridge.çilek >= 1) {
                state.fridge.elma--; state.fridge.çilek--;
                updateBars('hng', 45); updateBars('hth', 45); addXp(25);
                alert("🍹 Harika bir Smoothie hazırlandı!");
            } else { alert("Yetersiz malzeme! 1 Elma ve 1 Çilek gerekli."); }
        }

        function changeRoom(id, btn) {
            document.querySelectorAll('.room').forEach(r => r.classList.remove('active-room'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('on'));
            document.getElementById('room-' + id).classList.add('active-room');
            btn.classList.add('on');
            resetPetAnimation();
            syncStatus();
        }

        function openCharMenu() {
            const list = document.getElementById('char-list'); list.innerHTML = "";
            mainPets.forEach(p => {
                const isSel = state.activePet === p ? 'selected' : '';
                list.innerHTML += `<div class="char-card ${isSel}" onclick="selectChar('${p}')"><img src="${raw+p}"><p>${p.split('.')[0].toUpperCase()}</p></div>`;
            });
            document.getElementById('char-overlay').style.display = 'flex';
        }
        function selectChar(p) { state.activePet = p; state.happiness = 80; document.getElementById('char-overlay').style.display = 'none'; render(); updateUiEmotion(); syncStatus(); }
        function closeCharMenu() { document.getElementById('char-overlay').style.display = 'none'; }

        function updateBars(type, amount) { state.bars[type] = Math.min(100, Math.max(0, state.bars[type] + amount)); render(); syncStatus(); }

        function setupSeedUI(btn) {
            btn.parentElement.querySelectorAll('button').forEach(b => b.style.border = 'none');
            btn.style.border = '2px solid var(--p)';
        }

        function plant(i) {
            if(state.plots[i]) {
                if(state.plots[i].status === 'ready') {
                    state.fridge[state.plots[i].type]++; state.plots[i] = null;
                    document.getElementById('plot-'+i).innerHTML = "";
                    document.getElementById('plot-'+i).classList.remove('ready');
                    updateBars('gar', 15);
                }
                return;
            }
            state.plots[i] = { type: state.seed, status: 'growing' };
            const el = document.getElementById('plot-'+i);
            el.innerHTML = state.seed === 'elma'?'🍎':state.seed==='havuç'?'🥕':'🍓';
            setTimeout(() => { if(state.plots[i]) { state.plots[i].status = 'ready'; el.classList.add('ready'); } }, 4000);
        }

        function buyPizza() { if(state.gold >= 15) { state.gold -= 15; updateBars('hng', 25); addXp(5); } }
        function wash() { updateBars('cln', 40); addXp(5); }
        function eatFridge() {
            for(let k in state.fridge) { if(state.fridge[k] > 0) { state.fridge[k]--; updateBars('hng', 20); return; } }
        }

        function sleep() {
            let btn = document.getElementById('slp-btn'); btn.disabled = true; let sec = 10;
            let iv = setInterval(() => {
                sec--; document.getElementById('slp-status').innerText = "Zzz... " + sec;
                if(sec <= 0) { clearInterval(iv); btn.disabled = false; updateBars('slp', 100); addXp(15); document.getElementById('slp-status').innerText = "Uyandı!"; }
            }, 1000);
        }

        function openEgg() {
            if(state.gold < 50) return; state.gold -= 50;
            const pick = miniPetFiles[Math.floor(Math.random()*miniPetFiles.length)];
            if(state.ownedMinis.includes(pick)) addXp(45); else { state.ownedMinis.push(pick); state.activeMini = pick; }
            updateIndex(); render(); syncStatus();
        }

        function updateIndex() {
            const grid = document.getElementById('index-grid'); grid.innerHTML = "";
            miniPetFiles.forEach(m => {
                const op = state.ownedMinis.includes(m) ? "1" : "0.2";
                grid.innerHTML += `<img src="${raw+m}" style="width:25px; height:25px; border-radius:50%; opacity:${op}; cursor:pointer;" onclick="if(state.ownedMinis.includes('${m}')){ state.activeMini='${m}'; render(); syncStatus(); }">`;
            });
        }

        function render() {
            document.getElementById('gold').innerText = state.gold;
            document.getElementById('xp').innerText = state.xp;
            document.getElementById('lvl').innerText = state.level;
            document.getElementById('pet-img').src = raw + state.activePet;
            if(state.activeMini) { document.getElementById('mini-img').src = raw + state.activeMini; document.getElementById('mini-img').style.display = 'block'; }
            document.getElementById('fridge-ui').innerText = `🍎:${state.fridge.elma} | 🥕:${state.fridge.havuç} | 🍓:${state.fridge.çilek}`;
            for(let k in state.bars) { const fill = document.getElementById('fill-'+k); if(fill) fill.style.width = state.bars[k] + "%"; }
        }

        window.onload = () => {
            updateIndex(); render(); syncStatus(); updateUiEmotion(); resetPetAnimation();
            // Zamanla azalan ihtiyaç barları
            setInterval(() => { for(let k in state.bars) state.bars[k] = Math.max(0, state.bars[k] - 0.25); render(); }, 3500);
            // Sunucuya aktif kalma sinyali gönderme
            setInterval(() => { syncStatus(); }, 4000);
        };
    </script>
</body>
</html>
