<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>The Pets Mansion V104 - Multiplayer</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root { --p: #6c5ce7; --bg: #f0f2f5; --hunger: #2ecc71; --clean: #00cec9; --sleep: #3498db; --fun: #f1c40f; --health: #ff7675; --garden: #e67e22; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); user-select: none; touch-action: manipulation; overflow: hidden; transition: background 0.5s; }
        body.dark-mode { --bg: #2d3436; background: var(--bg); }
        body.dark-mode .game-card { background: #353b48; color: white; }
        body.dark-mode .bars-grid { background: #2f3542; border-bottom-color: #444; }
        body.dark-mode .stat { background: #2f3542; color: white; }
        body.dark-mode .nav { background: #2f3542; border-top-color: #444; }

        .top-bar { position: fixed; top: 10px; width: 100%; display: flex; justify-content: space-around; z-index: 1000; padding: 0 5px; box-sizing: border-box; }
        .stat { background: white; padding: 5px 10px; border-radius: 12px; font-weight: 900; box-shadow: 0 4px 10px rgba(0,0,0,0.1); font-size: 11px; display: flex; align-items: center; gap: 4px; }

        .game-card { background: white; width: 92%; max-width: 400px; height: 82vh; margin: 60px auto; border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; position: relative; transition: 0.3s; }

        .bars-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; padding: 10px; background: #fafafa; border-bottom: 1px solid #eee; }
        .bar-wrap { font-size: 8px; font-weight: 900; }
        .bar-bg { background: #eee; height: 6px; border-radius: 3px; margin-top: 2px; overflow: hidden; }
        .bar-fill { height: 100%; width: 50%; transition: 0.5s; }

        .room { display: none; flex: 1; flex-direction: column; align-items: center; padding: 15px; overflow-y: auto; position: relative; }
        .active-room { display: flex; }

        .stage { position: relative; height: 120px; display: flex; justify-content: center; align-items: center; margin-top: 10px; }
        .main-pet { width: 90px; height: 90px; z-index: 2; transition: 0.3s; border-radius: 20px; object-fit: cover; }
        .mini-pet-follow { width: 40px; height: 40px; object-fit: cover; position: absolute; bottom: 5px; right: 25%; z-index: 3; border-radius: 50%; }

        /* MULTIPLAYER ALANI */
        .other-players-area { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 5px; width: 100%; min-height: 40px; border-top: 1px dashed #ccc; padding-top: 5px; }
        .other-player-pet { text-align: center; position: relative; cursor: pointer; animation: bounce 0.6s infinite alternate; }
        .other-player-pet img { width: 40px; height: 40px; border-radius: 50%; border: 3px solid var(--p); object-fit: cover; }
        .emoji-bubble { position: absolute; top: -25px; left: 50%; transform: translateX(-50%); background: white; border-radius: 10px; padding: 2px 6px; font-size: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); animation: floatUpEmoji 1.5s ease-out forwards; z-index: 100; }

        /* BAHÇE */
        .garden-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 100%; margin-top: 10px; }
        .plot { background: #8d6e63; height: 65px; border-radius: 12px; display: flex; align-items: center; justify-content: center; border: 3px solid #6d4c41; cursor: pointer; font-size: 24px; }
        .plot.growing { opacity: 0.6; transform: scale(0.8); }
        .plot.ready { animation: bounce 0.5s infinite; }

        /* OVERLAYS */
        #char-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.95); z-index: 5000; display: none; flex-direction: column; align-items: center; padding-top: 50px; }
        .char-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .char-card { text-align: center; cursor: pointer; }
        .char-card img { width: 100px; height: 100px; object-fit: cover; border-radius: 20px; border: 4px solid transparent; }
        .char-card:active img { border-color: var(--p); transform: scale(0.95); }

        /* OYUN ALANLARI */
        #game-canvas { background: #87ceeb; width: 100%; height: 180px; border-radius: 20px; position: relative; overflow: hidden; display: none; margin-top: 10px; }
        .balloon { position: absolute; width: 35px; height: 45px; border-radius: 50%; cursor: pointer; animation: floatUp 3s linear forwards; }
        .falling-fruit { position: absolute; font-size: 24px; cursor: pointer; animation: fallDown 2.5s linear forwards; }
        .basket-lane { position: absolute; bottom: 5px; width: 100%; display: flex; justify-content: space-around; }
        .basket-btn { background: rgba(0,0,0,0.4); border: none; color: white; padding: 5px 10px; border-radius: 10px; font-size: 12px; }

        /* GÖREV KUTUSU */
        .quest-box { background: #fff3cd; color: #856404; padding: 8px; border-radius: 10px; font-size: 10px; font-weight: bold; width: 90%; text-align: center; margin-bottom: 5px; }

        @keyframes floatUp { from { bottom: -50px; } to { bottom: 220px; } }
        @keyframes fallDown { from { top: -40px; } to { top: 220px; } }
        @keyframes floatUpEmoji { 0% { opacity: 0; transform: translate(-50(), 0); } 20% { opacity: 1; } 100% { opacity: 0; transform: translate(-50%, -30px); } }
        @keyframes bounce { 0% { transform: translateY(0); } 100% { transform: translateY(-5px); } }

        .btn { border: none; padding: 10px; border-radius: 15px; color: white; font-weight: 900; cursor: pointer; width: 90%; margin: 3px 0; box-shadow: 0 4px 0 rgba(0,0,0,0.1); font-size: 12px; }
        .btn:active { transform: translateY(2px); box-shadow: none; }
        .nav { height: 60px; display: flex; justify-content: space-around; align-items: center; background: white; border-top: 1px solid #eee; }
        .nav-btn { font-size: 20px; cursor: pointer; opacity: 0.3; background: none; border: none; }
        .nav-btn.on { opacity: 1; color: var(--p); transform: translateY(-3px); }
    </style>
</head>
<body>

    <div id="char-overlay">
        <h2>Karakterini Seç</h2>
        <div class="char-grid" id="char-list"></div>
        <button class="btn" style="background:#2f3542; margin-top:30px; width:150px;" onclick="closeCharMenu()">Kapat</button>
    </div>

    <div class="top-bar">
        <div class="stat">💰 <span id="gold">200</span></div>
        <div class="stat">✨ Lvl <span id="lvl">1</span> (<span id="xp">0</span>)</div>
        <button class="stat" onclick="toggleTheme()" style="cursor:pointer; border:none;" id="theme-btn">🌙 Mod</button>
        <button class="stat" onclick="openCharMenu()" style="cursor:pointer; border:none;">🔄 Pet</button>
    </div>

    <div class="game-card">
        <div class="bars-grid">
            <div class="bar-wrap">🍔 <div class="bar-bg"><div id="fill-hng" class="bar-fill" style="background:var(--hunger)"></div></div></div>
            <div class="bar-wrap">🧼 <div class="bar-bg"><div id="fill-cln" class="bar-fill" style="background:var(--clean)"></div></div></div>
            <div class="bar-wrap">😴 <div class="bar-bg"><div id="fill-slp" class="bar-fill" style="background:var(--sleep)"></div></div></div>
            <div class="bar-wrap">🎮 <div class="bar-bg"><div id="fill-fun" class="bar-fill" style="background:var(--fun)"></div></div></div>
            <div class="bar-wrap">❤️ <div class="bar-bg"><div id="fill-hth" class="bar-fill" style="background:var(--health)"></div></div></div>
            <div class="bar-wrap">🌳 <div class="bar-bg"><div id="fill-gar" class="bar-fill" style="background:var(--garden)"></div></div></div>
        </div>

        <div class="stage">
            <img id="pet-img" class="main-pet" src="">
            <img id="mini-img" class="mini-pet-follow" src="" style="display:none;">
            <div id="my-emoji-bubble"></div>
        </div>

        <div id="room-kitchen" class="room active-room">
            <div class="quest-box" id="q-kitchen">🎯 Görev: Yükleniyor...</div>
            <div id="fridge-ui" style="font-size:11px; margin-bottom:5px; font-weight:bold;">🍎:0 | 🥕:0 | 🍓:0</div>
            <button class="btn" style="background:#e74c3c" onclick="buyPizza()">🍕 PİZZA (15💰)</button>
            <button class="btn" style="background:#2ecc71" onclick="eatFridge()">🥫 BUZDOLABINDAN YE</button>
            <button class="btn" style="background:#9b59b6" onclick="craftSmoothie()">🍹 SÜPER SMOOTHIE YAP (Meyve harcar)</button>
            <button class="btn" style="background:#3498db" onclick="takeMeds()">💊 İLAÇ (10💰)</button>
            <div class="other-players-area" id="players-kitchen"></div>
        </div>

        <div id="room-garden" class="room">
            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <button onclick="state.seed='elma'" style="border:none; background:white; font-size:20px; cursor:pointer;">🍎</button>
                <button onclick="state.seed='havuç'" style="border:none; background:white; font-size:20px; cursor:pointer;">🥕</button>
                <button onclick="state.seed='çilek'" style="border:none; background:white; font-size:20px; cursor:pointer;">🍓</button>
            </div>
            <div class="garden-grid">
                <div class="plot" onclick="plant(0)" id="plot-0"></div>
                <div class="plot" onclick="plant(1)" id="plot-1"></div>
                <div class="plot" onclick="plant(2)" id="plot-2"></div>
                <div class="plot" onclick="plant(3)" id="plot-3"></div>
                <div class="plot" onclick="plant(4)" id="plot-4"></div>
                <div class="plot" onclick="plant(5)" id="plot-5"></div>
            </div>
            <div class="other-players-area" id="players-garden"></div>
        </div>

        <div id="room-bedroom" class="room">
            <h3>😴 YATAK ODASI</h3>
            <p id="slp-status">İyi geceler...</p>
            <button class="btn" style="background:var(--sleep)" id="slp-btn" onclick="sleep()">🛌 10 SN UYU</button>
            <div class="other-players-area" id="players-bedroom"></div>
        </div>

        <div id="room-bathroom" class="room">
            <h3>🧼 BANYO</h3>
            <button class="btn" style="background:var(--clean)" onclick="wash()">🚿 YIKAN</button>
            <div class="other-players-area" id="players-bathroom"></div>
        </div>

        <div id="room-play" class="room">
            <h3>🎮 OYUN ODASI</h3>
            <div style="display:flex; gap:5px; width:100%;">
                <button class="btn" style="background:var(--fun); width:50%;" id="game-btn1" onclick="startBalloons()">🎈 BALON</button>
                <button class="btn" style="background:#e67e22; width:50%;" id="game-btn2" onclick="startCatchGame()">🍎 MEYVE YAKALA</button>
            </div>
            <div id="game-canvas"></div>
            <div class="other-players-area" id="players-play"></div>
        </div>

        <div id="room-lab" class="room">
            <h3>🧬 LABORATUVAR</h3>
            <button class="btn" style="background:var(--p)" onclick="openEgg()">🥚 YUMURTA AÇ (50💰)</button>
            <div id="index-grid" style="display:grid; grid-template-columns:repeat(3,1fr); gap:5px; margin-top:10px;"></div>
            <div class="other-players-area" id="players-lab"></div>
        </div>

        <div class="nav">
            <button class="nav-btn on" onclick="changeRoom('kitchen', this)">🍴</button>
            <button class="nav-btn" onclick="changeRoom('garden', this)">🌳</button>
            <button class="nav-btn" onclick="changeRoom('bedroom', this)">😴</button>
            <button class="nav-btn" onclick="changeRoom('bathroom', this)">🧼</button>
            <button class="nav-btn" onclick="changeRoom('play', this)">🎮</button>
            <button class="nav-btn" onclick="changeRoom('lab', this)">🧬</button>
        </div>
    </div>

    <script>
        // FİRREBASE BAĞLANTISI (Senin DB adresinle güncellendi)
        const firebaseConfig = { databaseURL: "https://tomoyunu-5cd2f-default-rtdb.europe-west1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const raw = "https://raw.githubusercontent.com/darwin456222-ops/Darwiizl/main/";
        const mainPets = ["squeak.jpg", "flip.jpg", "sugar.jpg", "gus.jpg", "dot.jpg", "blinky.jpg"];
        const miniPetFiles = ["browny.jpg", "pinky.jpg", "sunny.jpg", "sleapy.jpg", "dinory.jpg", "stary.jpg"];

        let myId = localStorage.getItem('pm_uid') || 'Pet_' + Math.floor(Math.random()*9000 + 1000);
        localStorage.setItem('pm_uid', myId);

        let state = {
            gold: 200, xp: 0, level: 1,
            activePet: "blinky.jpg", seed: 'elma',
            fridge: { elma: 0, havuç: 0, çilek: 0 },
            bars: { hng: 60, cln: 60, slp: 60, fun: 60, hth: 60, gar: 60 },
            plots: [null, null, null, null, null, null],
            ownedMinis: [], activeMini: null,
            currentQuest: { type: 'eat', target: 2, current: 0, desc: 'Buzdolabından 2 kere yemek ye!' }
        };

        // KULLANICI DETAYLARINI REALTİME DB'YE GÖNDERME
        function syncStatus() {
            let activeRoomEl = document.querySelector('.room.active-room');
            let currentRoomId = activeRoomEl ? activeRoomEl.id.replace('room-', '') : 'kitchen';
            db.ref('players/' + myId).set({
                id: myId, pet: state.activePet, mini: state.activeMini || '',
                room: currentRoomId, lastSeen: Date.now(), emoji: state.currentEmoji || ''
            });
        }
        db.ref('players/' + myId).onDisconnect().remove();

        // MULTIPLAYER OYUNCULARI DİNLEME VE EMOJİ ATMA SİSTEMİ
        db.ref('players').on('value', (snap) => {
            document.querySelectorAll('.other-players-area').forEach(a => a.innerHTML = "");
            const players = snap.val();
            if(!players) return;
            for(let id in players) {
                if(id === myId) continue;
                const p = players[id];
                if(Date.now() - p.lastSeen > 15000) continue; // 15 sn inaktifse sil
                
                const area = document.getElementById('players-' + p.room);
                if(area) {
                    const pDiv = document.createElement('div');
                    pDiv.className = 'other-player-pet';
                    pDiv.innerHTML = `<img src="${raw+p.pet}"><div style="font-size:7px; font-weight:bold;">${p.id}</div>`;
                    if(p.emoji) {
                        pDiv.innerHTML += `<div class="emoji-bubble">${p.emoji}</div>`;
                    }
                    // Diğer oyuncuya tıklayınca emoji fırlat!
                    pDiv.onclick = () => { sendEmojiToPlayer(id); };
                    area.appendChild(pDiv);
                }
            }
        });

        function sendEmojiToPlayer(targetId) {
            const emojiler = ['❤️','😂','🔥','👋','⭐','👑'];
            const rastgeleEmoji = emojiler[Math.floor(Math.random()*emojiler.length)];
            state.currentEmoji = rastgeleEmoji;
            syncStatus();
            setTimeout(() => { state.currentEmoji = ''; syncStatus(); }, 1500);
        }

        // GECE GÜNDÜZ MODU
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            document.getElementById('theme-btn').innerText = isDark ? "☀️ Mod" : "🌙 Mod";
        }

        // GÖREV KONTROLÜ
        function checkQuest(action) {
            if(state.currentQuest && state.currentQuest.type === action) {
                state.currentQuest.current++;
                if(state.currentQuest.current >= state.currentQuest.target) {
                    state.gold += 40;
                    addXp(30);
                    alert("🎉 Görev Tamamlandı! +40💰 ve +30✨ kazandın!");
                    generateNewQuest();
                }
                document.getElementById('q-kitchen').innerText = `🎯 Görev: ${state.currentQuest.desc} (${state.currentQuest.current}/${state.currentQuest.target})`;
            }
        }

        function generateNewQuest() {
            const quests = [
                { type: 'eat', target: 2, current: 0, desc: 'Buzdolabından 2 kere yemek ye!' },
                { type: 'wash', target: 1, current: 0, desc: 'Banyoda 1 kez yıkan!' },
                { type: 'game', target: 5, current: 0, desc: 'Oyun odasında 5 puan kazan!' }
            ];
            state.currentQuest = quests[Math.floor(Math.random()*quests.length)];
            document.getElementById('q-kitchen').innerText = `🎯 Görev: ${state.currentQuest.desc} (0/${state.currentQuest.target})`;
        }

        // XP VE SEVİYE SİSTEMİ
        function addXp(amount) {
            state.xp += amount;
            if(state.xp >= state.level * 100) {
                state.xp -= (state.level * 100);
                state.level++;
                state.gold += 50;
                alert(`🎊 TEBRİKLER! Seviye Atladın! Yeni Seviyen: ${state.level}. Ödül: +50💰`);
            }
            render();
        }

        // GELİŞMİŞ MUTFAK: SMOOTHIE CRAFT
        function craftSmoothie() {
            if(state.fridge.elma >= 1 && state.fridge.çilek >= 1) {
                state.fridge.elma--;
                state.fridge.çilek--;
                updateBars('hng', 40);
                updateBars('hth', 40);
                addXp(15);
                alert("🍹 Leziz Süper Smoothie yapıldı! Açlık ve Sağlık +40 dolduruldu.");
            } else {
                alert("Yetersiz malzeme! 1 Elma 🍎 ve 1 Çilek 🍓 gerekiyor.");
            }
        }

        // MEYVE YAKALAMA MİNİ OYUNU
        function startCatchGame() {
            const cvs = document.getElementById('game-canvas');
            cvs.style.display = 'block';
            document.getElementById('game-btn1').style.display = 'none';
            document.getElementById('game-btn2').style.display = 'none';
            cvs.innerHTML = `<div class="basket-lane">
                <button class="basket-btn" onclick="moveBasket(10)">Sola Git 👈</button>
                <button class="basket-btn" onclick="moveBasket(75)">Sağa Git 👉</button>
            </div><div id="basket" style="position:absolute; bottom:30px; left:45%; font-size:24px;">🪣</div>`;
            
            let basketPos = 45;
            window.moveBasket = (pos) => { basketPos = pos; document.getElementById('basket').style.left = pos + "%"; };

            let fruitIv = setInterval(() => {
                const f = document.createElement('div');
                f.className = 'falling-fruit';
                const fTypes = ['🍎','🥕','🍓'];
                f.innerHTML = fTypes[Math.floor(Math.random()*3)];
                let fLeft = Math.random()*80;
                f.style.left = fLeft + "%";
                cvs.appendChild(f);

                setTimeout(() => {
                    if(Math.abs(fLeft - basketPos) < 20) {
                        state.gold += 3;
                        updateBars('fun', 6);
                        checkQuest('game');
                        render();
                    }
                    f.remove();
                }, 2400);
            }, 900);

            setTimeout(() => {
                clearInterval(fruitIv);
                cvs.style.display = 'none';
                document.getElementById('game-btn1').style.display = 'block';
                document.getElementById('game-btn2').style.display = 'block';
                cvs.innerHTML = "";
            }, 12000);
        }

        // DİĞER SİSTEMLER VE ODALAR
        function changeRoom(id, btn) {
            document.querySelectorAll('.room').forEach(r => r.classList.remove('active-room'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('on'));
            document.getElementById('room-' + id).classList.add('active-room');
            btn.classList.add('on');
            syncStatus();
        }

        function openCharMenu() {
            const list = document.getElementById('char-list');
            list.innerHTML = "";
            mainPets.forEach(p => {
                list.innerHTML += `
                    <div class="char-card" onclick="selectChar('${p}')">
                        <img src="${raw+p}">
                        <p style="font-weight:bold; margin-top:5px;">${p.split('.')[0].toUpperCase()}</p>
                    </div>`;
            });
            document.getElementById('char-overlay').style.display = 'flex';
        }

        function selectChar(p) {
            state.activePet = p;
            document.getElementById('char-overlay').style.display = 'none';
            render();
            syncStatus();
        }
        function closeCharMenu() { document.getElementById('char-overlay').style.display = 'none'; }

        function updateBars(type, amount) {
            state.bars[type] = Math.min(100, Math.max(0, state.bars[type] + amount));
            render();
        }

        function plant(i) {
            if(state.plots[i]) {
                if(state.plots[i].status === 'ready') {
                    state.fridge[state.plots[i].type]++;
                    state.plots[i] = null;
                    document.getElementById('plot-'+i).innerHTML = "";
                    document.getElementById('plot-'+i).classList.remove('ready');
                    updateBars('gar', 20);
                }
                return;
            }
            const icons = {elma:'🍎', havuç:'🥕', çilek:'🍓'};
            state.plots[i] = { type: state.seed, status: 'growing' };
            const el = document.getElementById('plot-'+i);
            el.innerHTML = icons[state.seed];
            el.classList.add('growing');
            setTimeout(() => {
                if(state.plots[i]) {
                    state.plots[i].status = 'ready';
                    el.classList.remove('growing');
                    el.classList.add('ready');
                }
            }, 5000);
        }

        function buyPizza() { if(state.gold >= 15) { state.gold -= 15; updateBars('hng', 25); addXp(5); } }
        function takeMeds() { if(state.gold >= 10) { state.gold -= 10; updateBars('hth', 30); } }
        function wash() { updateBars('cln', 50); checkQuest('wash'); addXp(5); }
        function eatFridge() {
            for(let k in state.fridge) {
                if(state.fridge[k] > 0) { state.fridge[k]--; updateBars('hng', 20); checkQuest('eat'); return; }
            }
        }

        function sleep() {
            let btn = document.getElementById('slp-btn');
            btn.disabled = true;
            let sec = 10;
            document.body.classList.add('dark-mode');
            let iv = setInterval(() => {
                sec--; document.getElementById('slp-status').innerText = "Zzz... " + sec;
                if(sec <= 0) { 
                    clearInterval(iv); btn.disabled = false; updateBars('slp', 100); addXp(20);
                    document.getElementById('slp-status').innerText = "Uyandı!"; 
                    document.body.classList.remove('dark-mode');
                }
            }, 1000);
        }

        function startBalloons() {
            const cvs = document.getElementById('game-canvas');
            cvs.style.display = 'block';
            document.getElementById('game-btn1').style.display = 'none';
            document.getElementById('game-btn2').style.display = 'none';
            let gameIv = setInterval(() => {
                const b = document.createElement('div');
                b.className = 'balloon';
                b.style.left = Math.random()*80+"%";
                b.style.background = `hsl(${Math.random()*360}, 70%, 60%)`;
                b.onclick = () => { b.remove(); state.gold += 2; updateBars('fun', 5); checkQuest('game'); render(); };
                cvs.appendChild(b);
            }, 800);
            setTimeout(() => { 
                clearInterval(gameIv); cvs.style.display = 'none'; 
                document.getElementById('game-btn1').style.display = 'block';
                document.getElementById('game-btn2').style.display = 'block';
                cvs.innerHTML = "";
            }, 15000);
        }

        function openEgg() {
            if(state.gold < 50) return;
            state.gold -= 50;
            const pick = miniPetFiles[Math.floor(Math.random()*6)];
            if(state.ownedMinis.includes(pick)) addXp(50);
            else { state.ownedMinis.push(pick); state.activeMini = pick; }
            updateIndex(); render(); syncStatus();
        }

        function updateIndex() {
            const grid = document.getElementById('index-grid');
            grid.innerHTML = "";
            miniPetFiles.forEach(m => {
                const op = state.ownedMinis.includes(m) ? "1" : "0.2";
                grid.innerHTML += `<img src="${raw+m}" style="width:30px; height:30px; object-fit:cover; opacity:${op}; border-radius:5px;" onclick="if(state.ownedMinis.includes('${m}')){ state.activeMini='${m}'; render(); syncStatus(); }">`;
            });
        }

        function render() {
            document.getElementById('gold').innerText = state.gold;
            document.getElementById('xp').innerText = state.xp;
            document.getElementById('lvl').innerText = state.level;
            document.getElementById('pet-img').src = raw + state.activePet;
            if(state.activeMini) {
                document.getElementById('mini-img').src = raw + state.activeMini;
                document.getElementById('mini-img').style.display = 'block';
            }
            document.getElementById('fridge-ui').innerText = `🍎:${state.fridge.elma} | 🥕:${state.fridge.havuç} | 🍓:${state.fridge.çilek}`;
            for(let k in state.bars) {
                const fill = document.getElementById('fill-'+k);
                if(fill) fill.style.width = state.bars[k] + "%";
            }
        }

        window.onload = () => {
            generateNewQuest();
            updateIndex();
            render();
            syncStatus();
            setInterval(() => {
                for(let k in state.bars) state.bars[k] = Math.max(0, state.bars[k] - 0.2);
                render();
            }, 3000);
            setInterval(() => { syncStatus(); }, 5000); // 5 saniyede bir konumu güncelle
        };
    </script>
</body>
</html>
