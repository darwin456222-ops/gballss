<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>The Pets Mansion V105 - Moosey & Yeyet Edition</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root { --p: #6c5ce7; --bg: #f0f2f5; --hunger: #2ecc71; --clean: #00cec9; --sleep: #3498db; --fun: #f1c40f; --health: #ff7675; --garden: #e67e22; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); user-select: none; touch-action: manipulation; overflow: hidden; transition: 0.3s; }
        
        .top-bar { position: fixed; top: 10px; width: 100%; display: flex; justify-content: space-around; z-index: 1000; padding: 0 5px; box-sizing: border-box; }
        .stat { background: white; padding: 5px 10px; border-radius: 12px; font-weight: 900; box-shadow: 0 4px 10px rgba(0,0,0,0.1); font-size: 11px; display: flex; align-items: center; gap: 4px; }

        .game-card { background: white; width: 92%; max-width: 400px; height: 82vh; margin: 60px auto; border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .bars-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; padding: 10px; background: #fafafa; border-bottom: 1px solid #eee; }
        .bar-wrap { font-size: 8px; font-weight: 900; }
        .bar-bg { background: #eee; height: 6px; border-radius: 3px; margin-top: 2px; overflow: hidden; }
        .bar-fill { height: 100%; width: 50%; transition: 0.5s; }

        .room { display: none; flex: 1; flex-direction: column; align-items: center; padding: 12px; overflow-y: auto; position: relative; }
        .active-room { display: flex; }

        .stage { position: relative; height: 110px; display: flex; justify-content: center; align-items: center; margin-top: 5px; }
        .main-pet { width: 85px; height: 85px; z-index: 2; border-radius: 20px; object-fit: cover; }
        .mini-pet-follow { width: 35px; height: 35px; object-fit: cover; position: absolute; bottom: 5px; right: 25%; z-index: 3; border-radius: 50%; }

        /* MULTIPLAYER ALANLARI */
        .other-players-area { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: auto; width: 100%; min-height: 55px; border-top: 1px dashed #ccc; padding-top: 5px; }
        .other-player-pet { text-align: center; position: relative; cursor: pointer; }
        .other-player-pet img { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--p); object-fit: cover; }
        
        /* KAFADA UÇAN CHAT VE EMOJİ BALONLARI */
        .bubble-msg { position: absolute; top: -35px; left: 50%; transform: translateX(-50%); background: white; border: 2px solid var(--p); padding: 3px 8px; border-radius: 12px; font-size: 10px; font-weight: bold; white-space: nowrap; box-shadow: 0 4px 6px rgba(0,0,0,0.1); z-index: 100; }
        .bubble-emoji { position: absolute; top: -55px; left: 50%; transform: translateX(-50%); font-size: 20px; animation: bounce 0.4s infinite alternate; z-index: 101; }

        /* BAHÇE VE MARKET */
        .garden-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 100%; margin-top: 5px; }
        .plot { background: #8d6e63; height: 55px; border-radius: 12px; display: flex; align-items: center; justify-content: center; border: 3px solid #6d4c41; cursor: pointer; font-size: 20px; }
        .plot.ready { animation: bounce 0.5s infinite alternate; }

        /* OYUN ALANI */
        #game-canvas { background: #87ceeb; width: 100%; height: 160px; border-radius: 20px; position: relative; overflow: hidden; display: none; margin-top: 5px; }
        .balloon { position: absolute; width: 30px; height: 40px; border-radius: 50%; cursor: pointer; }
        .falling-fruit { position: absolute; font-size: 24px; z-index: 10; animation: fallDown 2.4s linear forwards; }

        /* SKOR TABLOSU */
        .leaderboard-list { width: 100%; background: #f8f9fa; border-radius: 15px; padding: 10px; box-sizing: border-box; margin-top: 5px; font-size: 11px; }
        .leaderboard-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #eee; font-weight: bold; }

        /* CHAT BAR */
        .chat-bar { display: flex; gap: 4px; width: 100%; margin-top: 4px; }
        .chat-bar input { flex: 1; padding: 6px; border-radius: 10px; border: 1px solid #ccc; font-size: 11px; }

        @keyframes bounce { 0% { transform: translate(-50%, 0); } 100% { transform: translate(-50%, -5px); } }
        @keyframes fallDown { from { top: -30px; } to { top: 170px; } }

        .btn { border: none; padding: 9px; border-radius: 12px; color: white; font-weight: 900; cursor: pointer; width: 90%; margin: 3px 0; box-shadow: 0 3px 0 rgba(0,0,0,0.1); font-size: 11px; }
        .nav { height: 55px; display: flex; justify-content: space-around; align-items: center; background: white; border-top: 1px solid #eee; }
        .nav-btn { font-size: 18px; cursor: pointer; opacity: 0.3; background: none; border: none; }
        .nav-btn.on { opacity: 1; color: var(--p); }

        /* KARAKTER SEÇİM EKRANI */
        #char-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.95); z-index: 5000; display: none; flex-direction: column; align-items: center; padding-top: 30px; overflow-y: auto; }
        .char-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; padding-bottom: 20px; }
        .char-card { text-align: center; cursor: pointer; }
        .char-card img { width: 90px; height: 90px; object-fit: cover; border-radius: 20px; border: 4px solid transparent; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .char-card p { margin: 4px 0 0 0; font-size: 11px; font-weight: bold; color: #333; }
        .char-card:active img { border-color: var(--p); transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="char-overlay">
        <h2 style="margin-bottom: 5px;">Karakterini Seç</h2>
        <div class="char-grid" id="char-list"></div>
        <button class="btn" style="background:#2f3542; margin:20px 0; width:150px;" onclick="closeCharMenu()">Kapat</button>
    </div>

    <div class="top-bar">
        <div class="stat">💰 <span id="gold">200</span></div>
        <div class="stat">✨ Lvl <span id="lvl">1</span> (<span id="xp">0</span>)</div>
        <button class="stat" onclick="openCharMenu()" style="cursor:pointer; border:none;">🔄 Karakter</button>
    </div>

    <div class="game-card">
        <div class="bars-grid">
            <div class="bar-wrap">🍔 <div class="bar-bg"><div id="fill-hng" class="bar-fill" style="background:var(--hunger)"></div></div></div>
            <div class="bar-wrap">🧼 <div class="bar-bg"><div id="fill-cln" class="bar-fill" style="background:var(--clean)"></div></div></div>
            <div class="bar-wrap">😴 <div class="bar-bg"><div id="fill-slp" class="bar-fill" style="background:var(--sleep)"></div></div></div>
            <div class="bar-wrap">🎮 <div class="bar-bg"><div id="fill-fun" class="bar-fill" style="background:var(--fun)"></div></div></div>
            <div class="bar-wrap">❤️ <div class="bar-bg"><div id="fill-hth" class="bar-fill" style="background:var(--health)"></div></div></div>
            <div class="bar-wrap">🌳 <div class="bar-bg"><div id="fill-gar" class="bar-fill" style="background:var(--garden)"></div></div></div>
        </div>

        <div class="stage">
            <img id="pet-img" class="main-pet" src="">
            <img id="mini-img" class="mini-pet-follow" src="" style="display:none;">
        </div>

        <div id="room-kitchen" class="room active-room">
            <div id="fridge-ui" style="font-size:11px; margin-bottom:3px; font-weight:bold;">🍎:0 | 🥕:0 | 🍓:0</div>
            <button class="btn" style="background:#e74c3c" onclick="buyPizza()">🍕 PİZZA (15💰)</button>
            <button class="btn" style="background:#2ecc71" onclick="eatFridge()">🥫 BUZDOLABINDAN YE</button>
            <button class="btn" style="background:#9b59b6" onclick="craftSmoothie()">🍹 SÜPER SMOOTHIE (Açlık & Sağlık Fuller)</button>
            <div class="other-players-area" id="players-kitchen"></div>
        </div>

        <div id="room-garden" class="room">
            <div style="display:flex; gap:10px; margin-bottom:5px;">
                <button onclick="state.seed='elma'" style="border:none; background:white; font-size:18px;">🍎</button>
                <button onclick="state.seed='havuç'" style="border:none; background:white; font-size:18px;">🥕</button>
                <button onclick="state.seed='çilek'" style="border:none; background:white; font-size:18px;">🍓</button>
            </div>
            <div class="garden-grid">
                <div class="plot" onclick="plant(0)" id="plot-0"></div>
                <div class="plot" onclick="plant(1)" id="plot-1"></div>
                <div class="plot" onclick="plant(2)" id="plot-2"></div>
                <div class="plot" onclick="plant(3)" id="plot-3"></div>
                <div class="plot" onclick="plant(4)" id="plot-4"></div>
                <div class="plot" onclick="plant(5)" id="plot-5"></div>
            </div>
            <div class="other-players-area" id="players-garden"></div>
        </div>

        <div id="room-bedroom" class="room">
            <p id="slp-status">Mışıl mışıl...</p>
            <button class="btn" style="background:var(--sleep)" id="slp-btn" onclick="sleep()">🛌 10 SN UYU</button>
            <div class="other-players-area" id="players-bedroom"></div>
        </div>

        <div id="room-bathroom" class="room">
            <button class="btn" style="background:var(--clean)" onclick="wash()">🚿 YIKAN</button>
            <div class="other-players-area" id="players-bathroom"></div>
        </div>

        <div id="room-play" class="room">
            <div style="display:flex; gap:5px; width:100%; margin-bottom: 5px;">
                <button class="btn" style="background:var(--fun); width:50%; margin:0;" id="game-btn" onclick="startMultiplayerBalloons()">🎈 BALON YARIŞI</button>
                <button class="btn" style="background:#e67e22; width:50%; margin:0;" id="game-btn2" onclick="startCatchGame()">🍎 MEYVE YAKALA</button>
            </div>
            <div id="game-canvas"></div>
            <div class="other-players-area" id="players-play"></div>
        </div>

        <div id="room-lab" class="room">
            <button class="btn" style="background:var(--p)" onclick="openEgg()">🥚 YUMURTA AÇ (50💰)</button>
            <div id="index-grid" style="display:grid; grid-template-columns:repeat(3,1fr); gap:5px; margin-top:5px;"></div>
            
            <h4 style="margin: 8px 0 2px 0;">🏆 EN ZENGİN PETLER</h4>
            <div class="leaderboard-list" id="leaderboard"></div>
            
            <div class="other-players-area" id="players-lab"></div>
        </div>

        <div style="padding: 5px 12px; background: #fafafa; border-top:1px solid #eee;">
            <div style="display:flex; gap:3px; justify-content:center; margin-bottom:2px;">
                <button style="font-size:10px; border:none; background:#eee; padding:2px 5px; border-radius:5px;" onclick="sendQuickChat('Selam! 👋')">👋 Selam</button>
                <button style="font-size:10px; border:none; background:#eee; padding:2px 5px; border-radius:5px;" onclick="sendQuickChat('Naber? 😊')">😊 Naber</button>
                <button style="font-size:10px; border:none; background:#eee; padding:2px 5px; border-radius:5px;" onclick="sendEmoji('❤️')">❤️ Kalp</button>
                <button style="font-size:10px; border:none; background:#eee; padding:2px 5px; border-radius:5px;" onclick="sendEmoji('🔥')">🔥 Efso</button>
            </div>
            <div class="chat-bar">
                <input type="text" id="custom-msg" placeholder="Mesaj yaz veya arkadaşına tıklayıp besle/yıka...">
                <button class="btn" style="width:60px; margin:0; padding:6px; background:var(--p);" onclick="sendCustomChat()">Gönder</button>
            </div>
        </div>

        <div class="nav">
            <button class="nav-btn on" onclick="changeRoom('kitchen', this)">🍴</button>
            <button class="nav-btn" onclick="changeRoom('garden', this)">🌳</button>
            <button class="nav-btn" onclick="changeRoom('bedroom', this)">😴</button>
            <button class="nav-btn" onclick="changeRoom('bathroom', this)">🧼</button>
            <button class="nav-btn" onclick="changeRoom('play', this)">🎮</button>
            <button class="nav-btn" onclick="changeRoom('lab', this)">🧬</button>
        </div>
    </div>

    <script>
        // Sunucu bağlantısı
        const firebaseConfig = { databaseURL: "https://tomoyunu-5cd2f-default-rtdb.europe-west1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const raw = "https://raw.githubusercontent.com/darwin456222-ops/Darwiizl/main/";
        // Yeni karakterler Moosey ve Yeyet buraya eklendi!
        const mainPets = ["squeak.jpg", "flip.jpg", "sugar.jpg", "gus.jpg", "dot.jpg", "blinky.jpg", "moosey.jpg", "yeyet.jpg"];
        const miniPetFiles = ["browny.jpg", "pinky.jpg", "sunny.jpg", "sleapy.jpg", "dinory.jpg", "stary.jpg"];

        let myId = localStorage.getItem('pm_uid') || 'Pet_' + Math.floor(Math.random()*9000 + 1000);
        localStorage.setItem('pm_uid', myId);

        let state = {
            gold: 200, xp: 0, level: 1, activePet: "blinky.jpg", seed: 'elma',
            fridge: { elma: 0, havuç: 0, çilek: 0 },
            bars: { hng: 60, cln: 60, slp: 60, fun: 60, hth: 60, gar: 60 },
            plots: [null, null, null, null, null, null],
            ownedMinis: [], activeMini: null,
            msg: "", emo: ""
        };

        // VERİLERİ REALTİME DB'YE YAZMA
        function syncStatus() {
            let activeRoomEl = document.querySelector('.room.active-room');
            let roomName = activeRoomEl ? activeRoomEl.id.replace('room-', '') : 'kitchen';
            db.ref('players/' + myId).set({
                id: myId, pet: state.activePet, room: roomName, gold: state.gold, level: state.level, xp: state.xp,
                message: state.msg, emoji: state.emo, lastSeen: Date.now(), bars: state.bars
            });
        }
        db.ref('players/' + myId).onDisconnect().remove();

        // CANLI OYUNCULARI VE TABLOYU DİNLEME
        db.ref('players').on('value', (snap) => {
            document.querySelectorAll('.other-players-area').forEach(a => a.innerHTML = "");
            const players = snap.val();
            if(!players) return;

            let leaderboardArr = [];

            for(let id in players) {
                const p = players[id];
                leaderboardArr.push(p);

                if(id === myId) {
                    if(p.bars) state.bars = p.bars;
                    continue;
                }
                if(Date.now() - p.lastSeen > 15000) continue;

                const area = document.getElementById('players-' + p.room);
                if(area) {
                    const pDiv = document.createElement('div');
                    pDiv.className = 'other-player-pet';
                    pDiv.innerHTML = `<img src="${raw+p.pet}"><div style="font-size:7px; font-weight:bold;">${p.id}</div>`;
                    
                    if(p.message) pDiv.innerHTML += `<div class="bubble-msg">${p.message}</div>`;
                    if(p.emoji) pDiv.innerHTML += `<div class="bubble-emoji">${p.emoji}</div>`;

                    // Arkadaş Etkileşim Menüsü
                    pDiv.onclick = () => {
                        let eylem = prompt(`"${p.id}" için ne yapmak istersin?\n1 - Besle (Mutfaktaysan ve 1 Elma harcar)\n2 - Yıka (Banyodaysan)`);
                        if(eylem === "1") {
                            if(state.fridge.elma > 0) {
                                state.fridge.elma--;
                                db.ref(`players/${id}/bars/hng`).transaction(h => Math.min(100, (h || 0) + 20));
                                addXp(20);
                                alert("Arkadaşını besledin! +20✨ XP kazandın.");
                            } else { alert("Buzdolabında elma yok!"); }
                        } else if(eylem === "2") {
                            db.ref(`players/${id}/bars/cln`).transaction(c => Math.min(100, (c || 0) + 30));
                            addXp(20);
                            alert("Arkadaşını yıkadın! +20✨ XP kazandın.");
                        }
                    };
                    area.appendChild(pDiv);
                }
            }

            // LİDERLİK TABLOSU SIRALAMA
            leaderboardArr.sort((a,b) => (b.gold || 0) - (a.gold || 0));
            const lbEl = document.getElementById('leaderboard');
            if(lbEl) {
                lbEl.innerHTML = "";
                leaderboardArr.slice(0, 5).forEach((p, index) => {
                    lbEl.innerHTML += `<div class="leaderboard-item"><span>${index+1}. ${p.id} (Lvl ${p.level || 1})</span> <span>💰${p.gold || 0}</span></div>`;
                });
            }
        });

        // CHAT VE EMOJİ SİSTEMLERİ
        function sendQuickChat(text) { state.msg = text; syncStatus(); setTimeout(() => { state.msg = ""; syncStatus(); }, 3000); }
        function sendEmoji(emoji) { state.emo = emoji; syncStatus(); setTimeout(() => { state.emo = ""; syncStatus(); }, 2500); }
        function sendCustomChat() {
            let inp = document.getElementById('custom-msg');
            if(!inp.value.trim()) return;
            sendQuickChat(inp.value);
            inp.value = "";
        }

        // ORTAK BALON YARIŞI OYUNU
        function startMultiplayerBalloons() {
            db.ref('balloons').remove();
            document.getElementById('game-canvas').style.display = 'block';
            document.getElementById('game-btn').style.display = 'none';
            document.getElementById('game-btn2').style.display = 'none';

            for(let i=0; i<8; i++) {
                db.ref('balloons/b_' + i).set({
                    left: Math.random() * 80,
                    bottom: Math.random() * 100 + 20,
                    color: `hsl(${Math.random()*360}, 70%, 60%)`
                });
            }

            setTimeout(() => {
                document.getElementById('game-canvas').style.display = 'none';
                document.getElementById('game-btn').style.display = 'block';
                document.getElementById('game-btn2').style.display = 'block';
                db.ref('balloons').remove();
            }, 12000);
        }

        db.ref('balloons').on('value', (snap) => {
            const cvs = document.getElementById('game-canvas');
            if(cvs.style.display !== 'block' || document.getElementById('btn-left') !== null) return;
            
            document.querySelectorAll('.balloon').forEach(b => b.remove());
            const balloons = snap.val();
            if(!balloons) return;

            for(let id in balloons) {
                const bData = balloons[id];
                const b = document.createElement('div');
                b.className = 'balloon';
                b.style.left = bData.left + "%";
                b.style.bottom = bData.bottom + "px";
                b.style.background = bData.color;
                
                b.onclick = () => {
                    db.ref('balloons/' + id).remove();
                    state.gold += 5;
                    updateBars('fun', 8);
                    render();
                };
                cvs.appendChild(b);
            }
        });

        // 🍎 AKICI HAREKETLİ MEYVE YAKALAMA OYUNU (CROSS-STRIKE EKLENDİ)
        function startCatchGame() {
            const cvs = document.getElementById('game-canvas');
            cvs.style.display = 'block';
            document.getElementById('game-btn').style.display = 'none';
            document.getElementById('game-btn2').style.display = 'none';
            
            cvs.innerHTML = `
                <div id="basket" style="position:absolute; bottom:25px; left:45%; font-size:24px; transition: left 0.08s linear;">🪣</div>
                <div style="position:absolute; bottom:2px; width:100%; display:flex; justify-content:space-between; padding:0 10px; box-sizing:border-box; z-index:200;">
                    <button class="basket-btn" style="background:#2c3e50; color:white; padding:6px 12px; border-radius:8px; font-weight:bold;" id="btn-left">👈 SOL</button>
                    <button class="basket-btn" style="background:#2c3e50; color:white; padding:6px 12px; border-radius:8px; font-weight:bold;" id="btn-right">SAĞ 👉</button>
                </div>
            `;
            
            let basketPos = 45;
            let moveInterval = null;

            function doMove(direction) {
                if (direction === 'left') basketPos = Math.max(5, basketPos - 5);
                else if (direction === 'right') basketPos = Math.min(85, basketPos + 5);
                const bsk = document.getElementById('basket');
                if(bsk) bsk.style.left = basketPos + "%";
            }

            const btnLeft = document.getElementById('btn-left');
            const btnRight = document.getElementById('btn-right');

            btnLeft.addEventListener('mousedown', () => { clearInterval(moveInterval); moveInterval = setInterval(() => doMove('left'), 40); });
            btnLeft.addEventListener('touchstart', (e) => { e.preventDefault(); clearInterval(moveInterval); moveInterval = setInterval(() => doMove('left'), 40); });
            btnRight.addEventListener('mousedown', () => { clearInterval(moveInterval); moveInterval = setInterval(() => doMove('right'), 40); });
            btnRight.addEventListener('touchstart', (e) => { e.preventDefault(); clearInterval(moveInterval); moveInterval = setInterval(() => doMove('right'), 40); });

            const stopMoving = () => { clearInterval(moveInterval); };
            btnLeft.addEventListener('mouseup', stopMoving); btnLeft.addEventListener('touchend', stopMoving);
            btnRight.addEventListener('mouseup', stopMoving); btnRight.addEventListener('touchend', stopMoving);

            let fruitIv = setInterval(() => {
                const f = document.createElement('div');
                f.className = 'falling-fruit';
                f.innerHTML = ['🍎','🥕','🍓'][Math.floor(Math.random()*3)];
                let fLeft = Math.random() * 80 + 5;
                f.style.left = fLeft + "%";
                cvs.appendChild(f);

                setTimeout(() => {
                    if(Math.abs(fLeft - basketPos) <= 12) { 
                        state.gold += 5;
                        updateBars('fun', 8);
                        render();
                        
                        const bsk = document.getElementById('basket');
                        const petImg = document.getElementById('pet-img');
                        
                        if(bsk) { bsk.style.transform = "scale(1.2)"; setTimeout(() => bsk.style.transform="scale(1)", 100); }
                        
                        // 🔥 YEYET'İN ÇAPRAZ VURUŞ (CROSS-STRIKE) MEKANİĞİ
                        if(state.activePet === "yeyet.jpg" && petImg) {
                            petImg.style.transition = "transform 0.15s ease-in-out";
                            petImg.style.transform = "rotate(15deg) scale(1.3) translate(10px, -10px)";
                            setTimeout(() => {
                                petImg.style.transform = "rotate(-15deg) scale(1.3) translate(-10px, -10px)";
                                setTimeout(() => { petImg.style.transform = "none"; }, 150);
                            }, 150);
                        }
                    }
                    f.remove();
                }, 2400);
            }, 900);

            setTimeout(() => {
                clearInterval(fruitIv); clearInterval(moveInterval);
                cvs.style.display = 'none';
                document.getElementById('game-btn').style.display = 'block';
                document.getElementById('game-btn2').style.display = 'block';
                cvs.innerHTML = "";
            }, 15000);
        }

        // SEVİYE SİSTEMİ
        function addXp(amount) {
            state.xp += amount;
            if(state.xp >= state.level * 100) {
                state.xp -= (state.level * 100);
                state.level++;
                state.gold += 50;
                alert(`🎊 TEBRİKLER! Seviye Atladın! Yeni Seviyen: ${state.level}`);
            }
            render(); syncStatus();
        }

        // MUTFAK CRAFT
        function craftSmoothie() {
            if(state.fridge.elma >= 1 && state.fridge.çilek >= 1) {
                state.fridge.elma--; state.fridge.çilek--;
                updateBars('hng', 50); updateBars('hth', 50); addXp(20);
                alert("🍹 Harika bir Smoothie hazırladın!");
            } else { alert("Yetersiz meyve! 1 Elma ve 1 Çilek lazım."); }
        }

        // ODA DEĞİŞİMİ
        function changeRoom(id, btn) {
            document.querySelectorAll('.room').forEach(r => r.classList.remove('active-room'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('on'));
            document.getElementById('room-' + id).classList.add('active-room');
            btn.classList.add('on');
            syncStatus();
        }

        // KARAKTER SEÇİMİ
        function openCharMenu() {
            const list = document.getElementById('char-list'); list.innerHTML = "";
            mainPets.forEach(p => {
                list.innerHTML += `<div class="char-card" onclick="selectChar('${p}')"><img src="${raw+p}"><p>${p.split('.')[0].toUpperCase()}</p></div>`;
            });
            document.getElementById('char-overlay').style.display = 'flex';
        }
        function selectChar(p) { state.activePet = p; document.getElementById('char-overlay').style.display = 'none'; render(); syncStatus(); }
        function closeCharMenu() { document.getElementById('char-overlay').style.display = 'none'; }

        function updateBars(type, amount) { state.bars[type] = Math.min(100, Math.max(0, state.bars[type] + amount)); render(); syncStatus(); }

        // BAHÇE EKİMİ
        function plant(i) {
            if(state.plots[i]) {
                if(state.plots[i].status === 'ready') {
                    state.fridge[state.plots[i].type]++; state.plots[i] = null;
                    document.getElementById('plot-'+i).innerHTML = "";
                    document.getElementById('plot-'+i).classList.remove('ready');
                    updateBars('gar', 20);
                }
                return;
            }
            state.plots[i] = { type: state.seed, status: 'growing' };
            const el = document.getElementById('plot-'+i);
            el.innerHTML = state.seed === 'elma'?'🍎':state.seed==='havuç'?'🥕':'🍓';
            setTimeout(() => { if(state.plots[i]) { state.plots[i].status = 'ready'; el.classList.add('ready'); } }, 4000);
        }

        function buyPizza() { if(state.gold >= 15) { state.gold -= 15; updateBars('hng', 25); addXp(5); } }
        function wash() { updateBars('cln', 40); addXp(5); }
        function eatFridge() {
            for(let k in state.fridge) { if(state.fridge[k] > 0) { state.fridge[k]--; updateBars('hng', 20); return; } }
        }

        function sleep() {
            let btn = document.getElementById('slp-btn'); btn.disabled = true; let sec = 10;
            let iv = setInterval(() => {
                sec--; document.getElementById('slp-status').innerText = "Zzz... " + sec;
                if(sec <= 0) { clearInterval(iv); btn.disabled = false; updateBars('slp', 100); addXp(15); document.getElementById('slp-status').innerText = "Uyandı!"; }
            }, 1000);
        }

        // YUMURTA AÇMA
        function openEgg() {
            if(state.gold < 50) return; state.gold -= 50;
            const pick = miniPetFiles[Math.floor(Math.random()*6)];
            if(state.ownedMinis.includes(pick)) addXp(40); else { state.ownedMinis.push(pick); state.activeMini = pick; }
            updateIndex(); render(); syncStatus();
        }

        function updateIndex() {
            const grid = document.getElementById('index-grid'); grid.innerHTML = "";
            miniPetFiles.forEach(m => {
                const op = state.ownedMinis.includes(m) ? "1" : "0.2";
                grid.innerHTML += `<img src="${raw+m}" style="width:30px; opacity:${op}" onclick="if(state.ownedMinis.includes('${m}')){ state.activeMini='${m}'; render(); syncStatus(); }">`;
            });
        }

        function render() {
            document.getElementById('gold').innerText = state.gold;
            document.getElementById('xp').innerText = state.xp;
            document.getElementById('lvl').innerText = state.level;
            document.getElementById('pet-img').src = raw + state.activePet;
            if(state.activeMini) { document.getElementById('mini-img').src = raw + state.activeMini; document.getElementById('mini-img').style.display = 'block'; }
            document.getElementById('fridge-ui').innerText = `🍎:${state.fridge.elma} | 🥕:${state.fridge.havuç} | 🍓:${state.fridge.çilek}`;
            for(let k in state.bars) { const fill = document.getElementById('fill-'+k); if(fill) fill.style.width = state.bars[k] + "%"; }
        }

        window.onload = () => {
            updateIndex(); render(); syncStatus();
            setInterval(() => { for(let k in state.bars) state.bars[k] = Math.max(0, state.bars[k] - 0.2); render(); }, 3000);
            setInterval(() => { syncStatus(); }, 4000);
        };
    </script>
</body>
</html>
