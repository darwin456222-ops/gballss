<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>The Pets Mansion V51 - Pro</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --p: #6c5ce7; --s: #e74c3c; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; overflow: hidden; background: var(--bg); }
        
        .screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; background: var(--bg); }
        .game-card { background: rgba(255,255,255,0.95); padding: 20px; border-radius: 30px; width: 85%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        /* Resimlerin düzgün görünmesi için stil */
        .pet-img { width: 110px; height: 110px; object-fit: contain; cursor: pointer; transition: 0.2s; background: #eee; border-radius: 20px; }
        
        /* Diğer stiller (Kısa tutulmuştur) */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 11px; font-weight: bold; margin-bottom: 10px; }
        .bar { background: #eee; height: 8px; border-radius: 5px; overflow: hidden; }
        .prog { height: 100%; width: 100%; transition: 0.3s; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 10px 0; border-top: 2px solid #eee; z-index: 100; }
        .nav-btn { background: none; border: none; font-size: 24px; opacity: 0.3; display: flex; flex-direction: column; align-items: center; }
        .nav-btn.active { opacity: 1; color: var(--p); }
        
        #arena-screen { display: none; position: fixed; inset: 0; background: #1e272e; z-index: 2000; color: white; }
        .fighter { width: 100px; position: relative; }
        .hp-box { width: 80px; height: 10px; background: #333; border: 1px solid white; position: absolute; top: -20px; left: 10px; border-radius: 5px; }
        .hp-fill { height: 100%; background: #2ecc71; width: 100%; }
        .jump { transform: translateY(-70px); transition: 0.15s; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen">
        <div class="game-card">
            <h1 style="color:var(--p)">The Pets V51</h1>
            <input type="text" id="name-in" placeholder="Pet Adı..." style="padding:12px; border-radius:12px; border:1px solid #ddd; width:80%; text-align:center; margin-bottom:10px;">
            <button onclick="saveName()" style="background:var(--p); color:white; border:none; padding:15px; width:88%; border-radius:15px; font-weight:bold;">BAŞLA</button>
        </div>
    </div>

    <div id="select-screen" class="screen" style="display:none;">
        <div class="game-card">
            <h2>Karakter Seç</h2>
            <div id="pet-list" style="display:grid; grid-template-columns: 1fr 1fr; gap: 15px;"></div>
        </div>
    </div>

    <div id="game-screen" style="display:none;">
        <div style="position:fixed; top:15px; width:100%; display:flex; justify-content:center; gap:10px; z-index:100;">
            <div style="background:white; padding:5px 12px; border-radius:12px; font-weight:bold;">💰 <span id="gold-txt">0</span></div>
            <div style="background:white; padding:5px 12px; border-radius:12px; font-weight:bold;">⭐ Lvl <span id="lvl-txt">1</span></div>
        </div>

        <div class="game-card" style="margin-top: 80px;">
            <div class="stats-grid">
                <div>🍔 Açlık <div class="bar"><div id="h-bar" class="prog" style="background:#2ecc71;"></div></div></div>
                <div>🚽 Tuvalet <div class="bar"><div id="t-bar" class="prog" style="background:#9b59b6;"></div></div></div>
                <div>😴 Uyku <div class="bar"><div id="s-bar" class="prog" style="background:#3498db;"></div></div></div>
                <div>🎮 Oyun <div class="bar"><div id="p-bar" class="prog" style="background:#f1c40f;"></div></div></div>
            </div>
            
            <div style="height:150px; display:flex; justify-content:center; align-items:center;">
                <img id="main-pet-img" class="pet-img" src="" onerror="imgError(this)">
            </div>

            <div id="kitchen-panel" class="room-panel">
                <button onclick="eat('🍕', 20, 10)" style="font-size:30px; border:none; background:none;">🍕</button>
            </div>
            
            <div id="garden-panel" class="room-panel" style="display:none;">
                <input type="number" id="room-id-input" placeholder="Oda Kodu">
                <button onclick="enterArena()" style="background:var(--s); color:white; border:none; padding:10px; border-radius:10px;">ARENAYA GİR</button>
            </div>
        </div>

        <div class="nav-bar">
            <button class="nav-btn active" onclick="goRoom('kitchen', this)">🍴</button>
            <button class="nav-btn" onclick="goRoom('garden', this)">🌳</button>
        </div>
    </div>

    <div id="arena-screen">
        <div style="padding:15px; display:flex; justify-content: space-between;">
            <button onclick="exitArena()" style="background:var(--s); color:white; border:none; border-radius:5px;">ÇIK</button>
            <div id="arena-info">Oda: -</div>
        </div>
        <div style="height:50%; display:flex; justify-content:space-around; align-items:flex-end; padding-bottom:30px;">
            <div id="p1" class="fighter">
                <div class="hp-box"><div id="p1-hp" class="hp-fill"></div></div>
                <img id="p1-img" src="" style="width:100%" onerror="imgError(this)">
                <div id="p1-name">-</div>
            </div>
            <div id="p2" class="fighter">
                <div class="hp-box"><div id="p2-hp" class="hp-fill"></div></div>
                <img id="p2-img" src="" style="width:100%" onerror="imgError(this)">
                <div id="p2-name">-</div>
            </div>
        </div>
        <button onclick="arenaHit()" style="width:100px; height:100px; background:var(--s); border-radius:50%; color:white; font-weight:bold; border:4px solid white;">VUR!</button>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://tomoyunu-5cd2f-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // RESİM DOSYA ADLARININ GITHUB İLE TAM AYNI OLDUĞUNA EMİN OL
        const pets = [
            {n:'Squeak', i:'Squeak.jpg'},
            {n:'Flip', i:'Flip.jpg'},
            {n:'Sugar', i:'Sugar.jpg'},
            {n:'Dot', i:'Dot.jpg'},
            {n:'Gus', i:'Gus.jpg'},
            {n:'Blinky', i:'Blinky.jpg'}
        ];

        let st = { name:"", coins:100, pet:null, img:null, lvl:1, xp:0, hunger:50, toilet:0, sleep:0, play:0 };
        let currentRoom = null; let mySlot = "";

        // RESİM YÜKLENEMEZSE ÇALIŞACAK FONKSİYON
        function imgError(image) {
            image.onerror = ""; 
            image.src = "https://via.placeholder.com/150?text=Pet"; // Resim bulunamazsa geçici resim koyar
            return true;
        }

        function init() {
            const list = document.getElementById('pet-list');
            pets.forEach(p => { 
                list.innerHTML += `<div onclick="selectPet('${p.n}','${p.i}')" style="background:#f9f9f9; padding:10px; border-radius:15px; cursor:pointer; border:1px solid #eee;">
                    <img src="${p.i}" style="width:100%; border-radius:10px;" onerror="imgError(this)">
                    <br><b style="font-size:12px;">${p.n}</b>
                </div>`; 
            });
            let saved = localStorage.getItem('pets_v51');
            if(saved) { st = JSON.parse(saved); if(st.name && st.pet) { document.getElementById('login-screen').style.display = 'none'; showGame(); } }
        }

        function saveName() { let v = document.getElementById('name-in').value; if(v.trim()){ st.name=v; document.getElementById('login-screen').style.display='none'; document.getElementById('select-screen').style.display='flex'; } }
        function selectPet(n, i) { st.pet=n; st.img=i; document.getElementById('select-screen').style.display='none'; showGame(); }
        function showGame() { document.getElementById('game-screen').style.display='block'; document.getElementById('main-pet-img').src=st.img; update(); }
        
        function update() {
            document.getElementById('gold-txt').innerText = st.coins;
            document.getElementById('lvl-txt').innerText = st.lvl;
            document.getElementById('h-bar').style.width = st.hunger + "%";
            localStorage.setItem('pets_v51', JSON.stringify(st));
        }

        function goRoom(r, b) {
            document.querySelectorAll('.room-panel').forEach(p => p.style.display = 'none');
            document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
            document.getElementById(r + '-panel').style.display = 'block';
            b.classList.add('active');
        }

        // ARENA FONKSİYONLARI (V49-50 İLE AYNI MANTIK)
        function enterArena() {
            let rid = document.getElementById('room-id-input').value;
            if(!rid) return;
            currentRoom = db.ref("rooms/" + rid);
            document.getElementById('arena-screen').style.display = 'block';
            currentRoom.once('value', (s) => {
                let d = s.val() || {};
                mySlot = (!d.p1) ? "p1" : "p2";
                currentRoom.child(mySlot).set({ name: st.name, img: st.img, hp: 100, jump: false });
                currentRoom.on('value', (snap) => {
                    let data = snap.val(); if(!data) return;
                    if(data.p1) updateFighter("p1", data.p1);
                    if(data.p2) updateFighter("p2", data.p2);
                });
            });
        }

        function updateFighter(slot, d) {
            document.getElementById(slot+'-img').src = d.img;
            document.getElementById(slot+'-name').innerText = d.name;
            document.getElementById(slot+'-hp').style.width = d.hp + "%";
            if(d.jump) document.getElementById(slot).classList.add('jump'); else document.getElementById(slot).classList.remove('jump');
        }

        function arenaHit() {
            let target = (mySlot === "p1") ? "p2" : "p1";
            currentRoom.child(mySlot).update({ jump: true });
            setTimeout(() => currentRoom.child(mySlot).update({ jump: false }), 150);
            currentRoom.child(target).once('value', (s) => { if(s.exists()) currentRoom.child(target).update({ hp: Math.max(0, s.val().hp - 10) }); });
        }

        function exitArena() { if(mySlot && currentRoom) currentRoom.child(mySlot).remove(); document.getElementById('arena-screen').style.display='none'; }

        init();
    </script>
</body>
</html>
